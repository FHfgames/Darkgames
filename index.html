<!DOCTYPE html>
<html>
<head>
<title>DarkPlay</title>

<style>
body{
margin:0;
background:#2b0000;
color:white;
font-family:sans-serif;
}

/* HEADER */
header{
padding:15px;
font-size:22px;
text-align:center;
background:#1a0000;
font-weight:bold;
letter-spacing:2px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

/* CARD */
.card{
background:#111;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 15px red;
}

/* IMAGE */
.card img{
width:100%;
height:120px;
object-fit:cover;
display:block;
}

/* TITLE */
.title{
padding:8px;
font-size:13px;
font-weight:bold;
}

/* BUTTON */
button{
margin:10px;
padding:10px;
border:none;
background:red;
color:white;
border-radius:8px;
cursor:pointer;
}

/* GAME PLAYER */
iframe{
width:100%;
height:500px;
border:none;
background:black;
}

</style>

<script>
function load(url){
document.getElementById("game").src = url;
}

function fullscreen(){
let iframe = document.getElementById("game");
if (iframe.requestFullscreen) iframe.requestFullscreen();
}
</script>

</head>

<body>

<header>DarkPlay 🔥</header>

<button onclick="fullscreen()">Fullscreen</button>

<div class="grid">
