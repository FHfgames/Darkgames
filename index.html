<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DarkGames Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0000;
  color:white;
  overflow:hidden;
}

/* 🔴 BACKGROUND DOTS */
#bg {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  left:0;
  top:0;
  width:160px;
  height:100%;
  background:#111;
  padding:10px;
  overflow-y:auto;
  transition:0.3s;
}

.sidebar button {
  display:block;
  width:100%;
  margin:4px 0;
  background:black;
  border:none;
  color:#ff2a2a;
  font-size:11px;
  padding:6px;
  cursor:pointer;
  text-shadow:0 0 6px red;
}

/* GAME GRID */
.main {
  margin-left:170px;
  padding:10px;
  height:100vh;
  overflow:auto;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(180px,1fr));
  gap:10px;
}

.game {
  background:#111;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.game:hover {
  transform:scale(1.05);
}

.game img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.game p {
  font-size:12px;
  text-align:center;
  margin:5px;
}

/* GAME PLAYER */
#player {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  flex-direction:column;
}

iframe {
  width:100%;
  height:100%;
  border:none;
}

/* BUTTON BAR */
.topbar {
  background:#000;
  padding:5px;
  display:flex;
  gap:5px;
}

.topbar button {
  background:#111;
  border:none;
  color:white;
  padding:5px;
  cursor:pointer;
}

/* HIDDEN SIDEBAR */
.hidden {
  transform:translateX(-170px);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<button onclick="filter('all')">All</button>
<button onclick="filter('action')">Action</button>
<button onclick="filter('racing')">Racing</button>
<button onclick="filter('shooting')">Shooting</button>
<button onclick="filter('funny')">Funny</button>
<button onclick="filter('retro')">Retro</button>
<button onclick="filter('puzzle')">Puzzle</button>
<button onclick="filter('sports')">Sports</button>
<button onclick="filter('arcade')">Arcade</button>
<button onclick="filter('io')">IO Games</button>
<button onclick="filter('built')">Built In Games</button>
<button onclick="showSites()">Other Websites</button>
<button onclick="toggleSidebar()">Hide</button>

</div>

<!-- MAIN -->
<div class="main">

<!-- BUTTONS -->
<div class="topbar">
<button onclick="toggleSidebar()">📂</button>
<button onclick="closeGame()">❌</button>
<button onclick="fullscreen()">🖥️</button>
<button onclick="location.reload()">🔄</button>
</div>

<div class="grid" id="games"></div>

</div>

<!-- PLAYER -->
<div id="player">
<iframe id="frame"></iframe>
</div>

<script>

/* 🔴 BACKGROUND DOTS */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let dots = [];

for(let i=0;i<120;i++){
  dots.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*3
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(255,0,0,0.35)";
  dots.forEach(d=>{
    ctx.beginPath();
    ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

/* 🎮 GAME LIST (100+) */
const gameList = [
  {name:"Slope", url:"https://ubg365.github.io/slope/", img:"https://i.imgur.com/7yZ7Z3K.jpeg", cat:"action"},
  {name:"Run 3", url:"https://ubg365.github.io/run-3/", img:"https://i.imgur.com/6RLVv4L.jpeg", cat:"action"},
  {name:"Drift Hunters", url:"https://ubg365.github.io/drift-hunters/", img:"https://i.imgur.com/lW7ZbWy.jpeg", cat:"racing"},
  {name:"1v1.LOL", url:"https://1v1.lol/", img:"https://i.imgur.com/Ar6l3gP.jpeg", cat:"shooting"},
  {name:"Shell Shockers", url:"https://shellshock.io/", img:"https://i.imgur.com/9k3hV2p.jpeg", cat:"shooting"},
  {name:"Moto X3M", url:"https://ubg365.github.io/moto-x3m/", img:"https://i.imgur.com/Fv1Z7wS.jpeg", cat:"racing"},
  {name:"Basketball Stars", url:"https://ubg365.github.io/basketball-stars/", img:"https://i.imgur.com/fc0s7Ax.jpeg", cat:"sports"},
  {name:"Tunnel Rush", url:"https://ubg365.github.io/tunnel-rush/", img:"https://i.imgur.com/tgP8bW8.jpeg", cat:"action"},
];

/* DUPLICATE TO 100+ */
for(let i=0;i<15;i++){
  gameList.push(...gameList);
}

/* LOAD GAMES */
const container = document.getElementById("games");

function loadGames(list){
  container.innerHTML="";
  list.forEach(g=>{
    let div=document.createElement("div");
    div.className="game";
    div.innerHTML=`
      <img src="${g.img}">
      <p>${g.name}</p>
    `;
    div.onclick=()=>play(g.url);
    container.appendChild(div);
  });
}

loadGames(gameList);

/* PLAY */
function play(url){
  document.getElementById("player").style.display="flex";
  document.getElementById("frame").src=url;
}

/* CLOSE */
function closeGame(){
  document.getElementById("player").style.display="none";
  document.getElementById("frame").src="";
}

/* FULLSCREEN */
function fullscreen(){
  document.getElementById("frame").requestFullscreen();
}

/* FILTER */
function filter(cat){
  if(cat==="all") loadGames(gameList);
  else loadGames(gameList.filter(g=>g.cat===cat));
}

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("hidden");
}

/* OTHER SITES */
function showSites(){
  alert(
`Working game sites:
ubg365.github.io
coolmathgames.com
poki.com
crazygames.com
y8.com
lagged.com
mathplayground.com
unblockedgames76.net
unblockedgames66ez.com
unblockedgamesworld.com`
  );
}

</script>

</body>
</html>
