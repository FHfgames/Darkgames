<!DOCTYPE html>
<html>
<head>
<title>DarkPlay</title>

<style>
body {
  margin:0;
  background:#1a0000;
  color:#fff;
  font-family:Arial;
}

/* Header */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#330000;
  font-size:22px;
}

.logo {
  font-weight:bold;
}

/* Search */
.search {
  padding:8px;
  border-radius:8px;
  border:none;
  width:200px;
}

/* Layout */
.container {
  display:flex;
}

/* Sidebar */
.sidebar {
  width:200px;
  background:#220000;
  height:100vh;
  padding:10px;
}

.sidebar div {
  padding:10px;
  cursor:pointer;
  border-radius:8px;
}

.sidebar div:hover {
  background:#440000;
}

/* Main */
.main {
  flex:1;
  overflow:auto;
}

/* Player */
.player {
  padding:10px;
}

iframe {
  width:100%;
  height:500px;
  border:none;
  border-radius:10px;
}

/* Controls */
.controls {
  margin:10px;
}

button {
  padding:8px 12px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#ff1a1a;
  color:white;
  cursor:pointer;
}

/* Grid */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#330000;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  transform:scale(1.05);
}

.card img {
  width:100%;
  height:110px;
  object-fit:cover;
}

.card p {
  text-align:center;
  padding:6px;
  font-size:14px;
}

</style>

</head>

<body>

<header>
  <div class="logo">DarkPlay</div>
  <input class="search" placeholder="Search..." onkeyup="searchGames(this.value)">
</header>

<div class="container">

<div class="sidebar">
  <div onclick="show('all')">All Games</div>
  <div onclick="show('popular')">Popular</div>
  <div onclick="show('action')">Action</div>
  <div onclick="show('arcade')">Arcade</div>
  <div onclick="show('racing')">Racing</div>
</div>

<div class="main">

<div class="player">
  <div class="controls">
    <button onclick="fullscreen()">Fullscreen</button>
    <button onclick="clearGame()">Close</button>
  </div>
  <iframe id="game"></iframe>
</div>

<div class="grid" id="games"></div>

</div>

</div>
