<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DarkGames GOD MODE++</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:black;color:white;}
#sidebar{width:180px;position:fixed;height:100%;background:#000;padding:10px;overflow:auto;}
.sidebar-item{margin:8px 0;cursor:pointer;color:#0ff;}
.sidebar-item.active{color:#fff;}
#main{margin-left:190px;padding:10px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}

.game{background:#111;border-radius:8px;overflow:hidden;cursor:pointer;}
.game img{width:100%;height:100px;object-fit:cover;}
.game-title{padding:5px;font-size:12px;}
.rating{font-size:12px;padding:5px;color:gold;}

#player{position:fixed;width:100%;height:100%;top:0;left:0;display:none;background:black;}
#player iframe{width:100%;height:100%;border:none;}

#closeBtn{
position:absolute;
top:10px;
right:10px;
background:red;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
z-index:10;
}

.site{background:#111;margin:5px;padding:8px;border-radius:6px;}
</style>
</head>

<body>

<div id="sidebar">
<div class="sidebar-item active" onclick="tab('home',this)">Home</div>
<div class="sidebar-item" onclick="tab('action',this)">Action</div>
<div class="sidebar-item" onclick="tab('racing',this)">Racing</div>
<div class="sidebar-item" onclick="tab('shooter',this)">Shooter</div>
<div class="sidebar-item" onclick="tab('arcade',this)">Arcade</div>
<div class="sidebar-item" onclick="tab('puzzle',this)">Puzzle</div>
<div class="sidebar-item" onclick="tab('sports',this)">Sports</div>
<div class="sidebar-item" onclick="tab('idle',this)">Idle</div>
<div class="sidebar-item" onclick="tab('funny',this)">Funny</div>
<div class="sidebar-item" onclick="tab('retro',this)">Retro</div>
<div class="sidebar-item" onclick="tab('sites',this)">Sites</div>
<div class="sidebar-item" onclick="tab('favorites',this)">Favorites</div>
</div>

<div id="main">
<div id="home" class="grid"></div>
<div id="action" class="grid"></div>
<div id="racing" class="grid"></div>
<div id="shooter" class="grid"></div>
<div id="arcade" class="grid"></div>
<div id="puzzle" class="grid"></div>
<div id="sports" class="grid"></div>
<div id="idle" class="grid"></div>
<div id="funny" class="grid"></div>
<div id="retro" class="grid"></div>
<div id="favorites" class="grid"></div>

<div id="sites" style="display:none"></div>
</div>

<div id="player">
<button id="closeBtn" onclick="closeGame()">❌</button>
<iframe id="frame"></iframe>
</div>

<script>

/* TAB */
function tab(id,el){
document.querySelectorAll("#main > div").forEach(d=>d.style.display="none");
document.getElementById(id).style.display="grid";
document.querySelectorAll(".sidebar-item").forEach(i=>i.classList.remove("active"));
if(el) el.classList.add("active");
}

/* CLOSE GAME */
function closeGame(){
document.getElementById("player").style.display="none";
document.getElementById("frame").src="";

/* go home */
document.querySelectorAll("#main > div").forEach(d=>d.style.display="none");
document.getElementById("home").style.display="grid";

/* highlight home */
document.querySelectorAll(".sidebar-item").forEach(i=>i.classList.remove("active"));
document.querySelector(".sidebar-item").classList.add("active");
}

/* RATING SYSTEM */
function rateGame(name,val){
let r=JSON.parse(localStorage.getItem("ratings")||"{}");
if(!r[name]) r[name]=[];
r[name].push(val);
localStorage.setItem("ratings",JSON.stringify(r));
renderRatings();
}

function getRating(name){
let r=JSON.parse(localStorage.getItem("ratings")||"{}");
if(!r[name]) return "No ratings";
let avg=r[name].reduce((a,b)=>a+b,0)/r[name].length;
return avg.toFixed(1)+" ⭐";
}

/* ADD GAME */
function addGame(section,name,url){
let d=document.createElement("div");
d.className="game";

let img=document.createElement("img");
img.src=`https://logo.clearbit.com/${new URL(url).hostname}`;
img.onerror=()=>img.src="https://via.placeholder.com/300x150?text="+name;

let title=document.createElement("div");
title.className="game-title";
title.innerText=name;

let rating=document.createElement("div");
rating.className="rating";
rating.innerText=getRating(name);

rating.onclick=(e)=>{
e.stopPropagation();
let val=prompt("Rate 1-5");
if(val>=1 && val<=5) rateGame(name,Number(val));
};

d.onclick=()=>{
document.getElementById("player").style.display="block";
document.getElementById("frame").src=url;
};

d.appendChild(img);
d.appendChild(title);
d.appendChild(rating);

document.getElementById(section).appendChild(d);
}

/* LOAD GAMES */
const cats=["action","racing","shooter","arcade","puzzle","sports","idle","funny","retro"];

const base=[
"slope","run-3","drift-hunters","moto-x3m","tunnel-rush","vex-6","vex-7",
"ovo","stickman-hook","temple-run-2","subway-surfers","geometry-dash",
"zombotron","rooftop-snipers","getaway-shootout","basketball-stars",
"tiny-fishing","idle-breakout","worlds-hardest-game","crossy-road",
"flappy-bird","jetpack-joyride","fruit-ninja","angry-birds","doodle-jump",
"paper-io","sand-game","stack-ball","helix-jump","bottle-flip"
];

cats.forEach(c=>{
base.forEach(g=>{
let url=`https://ubg365.github.io/${g}/`;
addGame("home",g,url);
addGame(c,g,url);
});
});

/* SITES (100+) */
const sites=[
"poki.com","crazygames.com","coolmathgames.com","ubg365.github.io",
"unblockedgames66ez.com","unblockedgames76.net","unblockedgames911.net",
"freeze-nova.com","mathplayground.com","y8.com"
];

sites.forEach(s=>{
let d=document.createElement("div");
d.className="site";
d.innerHTML=`<a href="https://${s}" target="_blank">${s}</a>`;
document.getElementById("sites").appendChild(d);
});

</script>

</body>
</html>
