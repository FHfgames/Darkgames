<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PizzaGames 🍕</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background: radial-gradient(circle at center, #2b0000, #000);color:white}

/* SIDEBAR */
.sidebar{position:fixed;left:0;top:0;width:240px;height:100%;background:#140000;border-right:3px solid orange;padding-top:20px;overflow-y:auto}
.sidebar h1{text-align:center;color:orange;margin-bottom:20px;text-shadow:0 0 20px orange}
.sidebar a{display:block;padding:12px;color:#ffb347;text-decoration:none;font-weight:bold;text-shadow:0 0 10px orange;cursor:pointer}
.sidebar a:hover{background:orange;color:black}

/* MAIN */
.main{margin-left:240px;padding:20px}
.banner{width:100%;height:120px;background:linear-gradient(90deg,orange,red);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:bold;margin-bottom:20px}
.search{width:100%;padding:14px;background:#220000;color:white;border:1px solid orange;margin-bottom:20px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px}

/* CARD */
.card{background:#1a0000;border-radius:12px;overflow:hidden;cursor:pointer;transition:.25s;position:relative;border:1px solid #ff7b00}
.card:hover{transform:scale(1.05);box-shadow:0 0 25px orange}
.card img{width:100%;height:120px;object-fit:cover}
.card h3{padding:8px;font-size:14px}
.tag{position:absolute;top:6px;left:6px;background:orange;color:black;font-size:11px;padding:3px 6px;border-radius:6px}

/* PLAYER */
.player{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:none;z-index:999}
.player iframe{width:100%;height:100%;border:none}
.close{position:absolute;top:10px;right:20px;font-size:28px;cursor:pointer;color:white}
</style>
</head>

<body>

<div class="sidebar">
<h1>🍕 PizzaGames</h1>
<a onclick="filterGames('all')">🍕 All</a>
<a onclick="filterGames('action')">⚔️ Action</a>
<a onclick="filterGames('racing')">🏎️ Racing</a>
<a onclick="filterGames('multiplayer')">🌐 Multiplayer</a>
<a onclick="filterGames('puzzle')">🧩 Puzzle</a>
<a onclick="filterGames('shooter')">🔫 Shooter</a>
<a onclick="filterGames('arcade')">🕹️ Arcade</a>
</div>

<div class="main">
<div class="banner">🍕 PIZZAGAMES 🍕</div>
<input class="search" placeholder="Search games..." onkeyup="searchGames(this.value)">
<div class="grid" id="games"></div>
</div>

<div class="player" id="player">
<div class="close" onclick="closeGame()">✖</div>
<iframe id="frame"></iframe>
</div>

<script>
const fallback="https://picsum.photos/400/250?random=";

const games=[
{t:"Slope",c:"arcade",u:"https://ubg100.github.io/games/slope/"},
{t:"Run 3",c:"arcade",u:"https://ubg100.github.io/games/run3/"},
{t:"Tunnel Rush",c:"arcade",u:"https://ubg100.github.io/games/tunnel-rush/"},
{t:"Drift Boss",c:"racing",u:"https://ubg100.github.io/games/drift-boss/"},
{t:"Moto X3M",c:"racing",u:"https://ubg100.github.io/games/moto-x3m/"},
{t:"1v1.lol",c:"shooter",u:"https://ubg100.github.io/games/1v1lol/"},
{t:"Shell Shockers",c:"shooter",u:"https://shellshock.io/"},
{t:"Krunker",c:"shooter",u:"https://krunker.io/"},
{t:"Basket Random",c:"arcade",u:"https://ubg100.github.io/games/basket-random/"},
{t:"Paper.io 2",c:"multiplayer",u:"https://ubg100.github.io/games/paperio2/"},
{t:"Stickman Hook",c:"arcade",u:"https://ubg100.github.io/games/stickman-hook/"},
{t:"Geometry Dash",c:"arcade",u:"https://ubg100.github.io/games/geometry-dash/"},
{t:"Happy Wheels",c:"action",u:"https://ubg100.github.io/games/happy-wheels/"},
{t:"Snow Rider 3D",c:"racing",u:"https://ubg100.github.io/games/snow-rider-3d/"},
{t:"Temple Run 2",c:"arcade",u:"https://ubg100.github.io/games/temple-run-2/"},
{t:"Crossy Road",c:"arcade",u:"https://ubg100.github.io/games/crossy-road/"},
{t:"Rooftop Snipers",c:"action",u:"https://ubg100.github.io/games/rooftop-snipers/"},
{t:"Drive Mad",c:"racing",u:"https://ubg100.github.io/games/drive-mad/"},
{t:"Subway Surfers",c:"arcade",u:"https://ubg100.github.io/games/subway-surfers/"},
{t:"Minecraft Classic",c:"multiplayer",u:"https://classic.minecraft.net/"}
];

const gameList=[];
let id=0;

/* CREATE 100 GAMES */
for(let i=0;i<5;i++){
games.forEach(g=>{
gameList.push({
title:"🍕 "+g.t+" "+(i+1),
category:g.c,
url:g.u,
img:"https://picsum.photos/400/250?random="+(id++)
});
});
}

/* LOAD */
function loadGames(list){
const grid=document.getElementById("games");
grid.innerHTML="";
list.forEach((g,i)=>{
grid.innerHTML+=`
<div class="card" onclick="playGame('${g.url}')">
<div class="tag">${g.category}</div>
<img src="${g.img}" onerror="this.src='${fallback}'+${i}">
<h3>${g.title}</h3>
</div>`;
});
}

/* FILTER */
function filterGames(cat){
if(cat==="all"){loadGames(gameList);return;}
loadGames(gameList.filter(g=>g.category===cat));
}

/* SEARCH */
function searchGames(q){
q=q.toLowerCase();
loadGames(gameList.filter(g=>g.title.toLowerCase().includes(q)));
}

/* PLAYER */
function playGame(url){
document.getElementById("frame").src=url;
document.getElementById("player").style.display="block";
}
function closeGame(){
document.getElementById("player").style.display="none";
document.getElementById("frame").src="";
}

window.onload=()=>loadGames(gameList);
</script>

</body>
</html>
