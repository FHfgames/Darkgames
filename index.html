<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PizzaGames ULTRA 🍕</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background: radial-gradient(circle at center, #2b0000, #000);color:white}

/* SIDEBAR */
.sidebar{
position:fixed;left:0;top:0;width:250px;height:100%;
background:#140000;border-right:3px solid orange;
padding-top:20px;overflow-y:auto;
}
.sidebar h1{
text-align:center;color:orange;margin-bottom:20px;
text-shadow:0 0 25px orange;font-size:26px;
}
.sidebar a{
display:block;padding:13px;color:#ffb347;text-decoration:none;
font-weight:bold;text-shadow:0 0 10px orange;
cursor:pointer;font-size:15px;
}
.sidebar a:hover{background:orange;color:black}

/* MAIN */
.main{margin-left:250px;padding:20px}

/* BANNER */
.banner{
width:100%;height:140px;
background:linear-gradient(90deg,orange,red);
display:flex;align-items:center;justify-content:center;
font-size:36px;font-weight:bold;margin-bottom:20px;
text-shadow:0 0 25px black;
}

/* SEARCH */
.search{
width:100%;padding:16px;background:#220000;
color:white;border:1px solid orange;margin-bottom:20px;
font-size:17px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:16px;
}

/* CARD */
.card{
background:#1a0000;border-radius:14px;overflow:hidden;
cursor:pointer;transition:.3s;position:relative;
border:1px solid #ff7b00;
}
.card:hover{
transform:scale(1.06);
box-shadow:0 0 30px orange;
}
.card img{
width:100%;height:120px;object-fit:cover;
}
.card h3{
padding:8px;font-size:14px;
}

/* TAG */
.tag{
position:absolute;top:6px;left:6px;
background:orange;color:black;font-size:11px;
padding:4px 7px;border-radius:6px;
}

/* PLAYER */
.player{
position:fixed;top:0;left:0;width:100%;height:100%;
background:black;display:none;z-index:999;
}
.player iframe{width:100%;height:100%;border:none}
.close{
position:absolute;top:10px;right:20px;
font-size:30px;cursor:pointer;color:white;
}

/* EXTRA SECTIONS */
.section{
margin-bottom:30px;
}
.section h2{
margin-bottom:10px;
color:orange;
text-shadow:0 0 10px orange;
}

/* FOOTER */
.footer{
margin-top:40px;padding:25px;
text-align:center;border-top:1px solid orange;
opacity:.7;font-size:14px;
}
</style>
</head>

<body>

<div class="sidebar">
<h1>🍕 PizzaGames</h1>
<a onclick="filterGames('all')">🍕 Home</a>
<a onclick="filterGames('popular')">🔥 Hot Slices</a>
<a onclick="filterGames('new')">🆕 Fresh Out</a>
<a onclick="filterGames('horror')">👻 Spicy Horror</a>
<a onclick="filterGames('action')">⚔️ Action Feast</a>
<a onclick="filterGames('racing')">🏎️ Fast Delivery</a>
<a onclick="filterGames('multiplayer')">🌐 Multiplayer Party</a>
<a onclick="filterGames('builtin')">🎮 Built-in Oven</a>
<a onclick="filterGames('retro')">🕹️ Retro Recipes</a>
<a onclick="filterGames('puzzle')">🧩 Puzzle Toppings</a>
<a onclick="filterGames('shooter')">🔫 Shooter Sauce</a>
<a onclick="filterGames('favorites')">⭐ Favorites</a>
<a onclick="filterGames('all')">⚙️ Settings</a>
</div>

<div class="main">

<div class="banner">🍕 PIZZAGAMES ULTRA 🍕</div>

<input class="search" placeholder="Search games..." onkeyup="searchGames(this.value)">

<div class="section">
<h2>All Games</h2>
<div class="grid" id="games"></div>
</div>

<div class="footer">
<p>🍕 150+ Games • Ultra Mode • Extra Cheese • No Ads 🍕</p>
</div>

</div>

<div class="player" id="player">
<div class="close" onclick="closeGame()">✖</div>
<iframe id="frame"></iframe>
</div>

<script>
const fallback="https://picsum.photos/400/250?random=";

/* BASE GAMES (REAL LINKS) */
const baseGames=[
{t:"Slope",c:["popular","arcade"],u:"https://ubg100.github.io/games/slope/"},
{t:"Run 3",c:["popular","arcade"],u:"https://ubg100.github.io/games/run3/"},
{t:"Tunnel Rush",c:["arcade"],u:"https://ubg100.github.io/games/tunnel-rush/"},
{t:"Drift Boss",c:["racing"],u:"https://ubg100.github.io/games/drift-boss/"},
{t:"Moto X3M",c:["racing"],u:"https://ubg100.github.io/games/moto-x3m/"},
{t:"1v1.lol",c:["shooter","multiplayer"],u:"https://ubg100.github.io/games/1v1lol/"},
{t:"Shell Shockers",c:["shooter","multiplayer"],u:"https://shellshock.io/"},
{t:"Krunker",c:["shooter","multiplayer"],u:"https://krunker.io/"},
{t:"Basket Random",c:["action"],u:"https://ubg100.github.io/games/basket-random/"},
{t:"Paper.io 2",c:["multiplayer"],u:"https://ubg100.github.io/games/paperio2/"},
{t:"Stickman Hook",c:["arcade"],u:"https://ubg100.github.io/games/stickman-hook/"},
{t:"Geometry Dash",c:["arcade"],u:"https://ubg100.github.io/games/geometry-dash/"},
{t:"Happy Wheels",c:["action"],u:"https://ubg100.github.io/games/happy-wheels/"},
{t:"Snow Rider 3D",c:["racing"],u:"https://ubg100.github.io/games/snow-rider-3d/"},
{t:"Temple Run 2",c:["arcade"],u:"https://ubg100.github.io/games/temple-run-2/"},
{t:"Crossy Road",c:["arcade"],u:"https://ubg100.github.io/games/crossy-road/"},
{t:"Rooftop Snipers",c:["action","multiplayer"],u:"https://ubg100.github.io/games/rooftop-snipers/"},
{t:"Drive Mad",c:["racing"],u:"https://ubg100.github.io/games/drive-mad/"},
{t:"Subway Surfers",c:["popular","arcade"],u:"https://ubg100.github.io/games/subway-surfers/"},
{t:"Minecraft Classic",c:["builtin","multiplayer"],u:"https://classic.minecraft.net/"}
];

/* EXPAND TO 150 */
const gameList=[];
let id=0;

for(let i=0;i<7;i++){
baseGames.forEach(g=>{
gameList.push({
title:"🍕 "+g.t+" "+(i+1),
categories:g.c,
url:g.u,
img:"https://picsum.photos/400/250?random="+(id++)
});
});
}

/* LOAD */
function loadGames(list){
const grid=document.getElementById("games");
grid.innerHTML="";
list.forEach((g,i)=>{
grid.innerHTML+=`
<div class="card" onclick="playGame('${g.url}')">
<div class="tag">${g.categories[0]}</div>
<img src="${g.img}" onerror="this.src='${fallback}'+${i}">
<h3>${g.title}</h3>
</div>`;
});
}

/* FILTER */
function filterGames(cat){
if(cat==="all"){loadGames(gameList);return;}
loadGames(gameList.filter(g=>g.categories.includes(cat)));
}

/* SEARCH */
function searchGames(q){
q=q.toLowerCase();
loadGames(gameList.filter(g=>g.title.toLowerCase().includes(q)));
}

/* PLAYER */
function playGame(url){
document.getElementById("frame").src=url;
document.getElementById("player").style.display="block";
}
function closeGame(){
document.getElementById("player").style.display="none";
document.getElementById("frame").src="";
}

window.onload=()=>loadGames(gameList);
</script>

</body>
</html>
