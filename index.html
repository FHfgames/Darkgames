<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PizzaGames ULTRA 🍕</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background: radial-gradient(circle at center, #2b0000, #000);color:white}
.sidebar{position:fixed;left:0;top:0;width:250px;height:100%;background:#140000;border-right:3px solid orange;padding-top:20px;overflow-y:auto}
.sidebar h1{text-align:center;color:orange;margin-bottom:20px;text-shadow:0 0 25px orange;font-size:26px}
.sidebar a{display:block;padding:13px;color:#ffb347;text-decoration:none;font-weight:bold;text-shadow:0 0 10px orange;cursor:pointer;font-size:15px}
.sidebar a:hover{background:orange;color:black}
.main{margin-left:250px;padding:20px}
.banner{width:100%;height:140px;background:linear-gradient(90deg,orange,red);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:bold;margin-bottom:20px}
.search{width:100%;padding:16px;background:#220000;color:white;border:1px solid orange;margin-bottom:20px;font-size:17px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px}
.card{background:#1a0000;border-radius:14px;overflow:hidden;cursor:pointer;transition:.3s;position:relative;border:1px solid #ff7b00}
.card:hover{transform:scale(1.06);box-shadow:0 0 30px orange}
.card img{width:100%;height:120px;object-fit:cover}
.card h3{padding:8px;font-size:14px}
.tag{position:absolute;top:6px;left:6px;background:orange;color:black;font-size:11px;padding:4px 7px;border-radius:6px}
.player{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:none;z-index:999}
.player iframe{width:100%;height:100%;border:none}
.close{position:absolute;top:10px;right:20px;font-size:30px;cursor:pointer;color:white}
.footer{margin-top:40px;padding:25px;text-align:center;border-top:1px solid orange;opacity:.7;font-size:14px}
</style>
</head>

<body>

<div class="sidebar">
<h1>🍕 PizzaGames</h1>
<a onclick="filterGames('all')">🍕 Home</a>
<a onclick="filterGames('popular')">🔥 Hot Slices</a>
<a onclick="filterGames('new')">🆕 Fresh Out</a>
<a onclick="filterGames('horror')">👻 Spicy Horror</a>
<a onclick="filterGames('action')">⚔️ Action Feast</a>
<a onclick="filterGames('racing')">🏎️ Fast Delivery</a>
<a onclick="filterGames('multiplayer')">🌐 Multiplayer Party</a>
<a onclick="filterGames('builtin')">🎮 Built-in Oven</a>
<a onclick="filterGames('retro')">🕹️ Retro Recipes</a>
<a onclick="filterGames('puzzle')">🧩 Puzzle Toppings</a>
<a onclick="filterGames('shooter')">🔫 Shooter Sauce</a>
<a onclick="filterGames('favorites')">⭐ Favorites</a>
<a onclick="filterGames('all')">⚙️ Settings</a>
</div>

<div class="main">
<div class="banner">🍕 PIZZAGAMES ULTRA 🍕</div>
<input class="search" placeholder="Search games..." onkeyup="searchGames(this.value)">
<div class="grid" id="games"></div>
<div class="footer"><p>🍕 100% SELF HOSTED • ALWAYS WORKS 🍕</p></div>
</div>

<div class="player" id="player">
<div class="close" onclick="closeGame()">✖</div>
<iframe id="frame"></iframe>
</div>

<script>
const fallback="https://picsum.photos/400/250?random=";

/*
⚠️ IMPORTANT:
You MUST upload games into /games/ folder in your repo
Example:
games/slope/index.html
games/run3/index.html
etc.

Below are 100 slots ready for real self-hosted games
*/

const gameList=[];
let id=0;

/* 100 SELF HOSTED GAME SLOTS */
const names=[
"Slope","Run 3","Tunnel Rush","Drift Boss","Moto X3M","1v1lol","Basket Random","Paperio2","Stickman Hook","Geometry Dash",
"Happy Wheels","Snow Rider","Temple Run 2","Crossy Road","Rooftop Snipers","Drive Mad","Subway Surfers","Minecraft",
"Vex 3","Vex 4","Vex 5","Vex 6","Vex 7","Duck Life","Duck Life 2","Duck Life 3","Duck Life 4",
"FNF","Baldi","Getaway Shootout","Soccer Random","Volley Random","Boxing Random","Bad Ice Cream",
"Agar Clone","Slither Clone","Shooter Game","Zombie Game","Platformer","Runner","Puzzle 1","Puzzle 2","Puzzle 3",
"Racing 1","Racing 2","Racing 3","Arcade 1","Arcade 2","Arcade 3","Arcade 4","Arcade 5","Arcade 6",
"Game 51","Game 52","Game 53","Game 54","Game 55","Game 56","Game 57","Game 58","Game 59","Game 60",
"Game 61","Game 62","Game 63","Game 64","Game 65","Game 66","Game 67","Game 68","Game 69","Game 70",
"Game 71","Game 72","Game 73","Game 74","Game 75","Game 76","Game 77","Game 78","Game 79","Game 80",
"Game 81","Game 82","Game 83","Game 84","Game 85","Game 86","Game 87","Game 88","Game 89","Game 90",
"Game 91","Game 92","Game 93","Game 94","Game 95","Game 96","Game 97","Game 98","Game 99","Game 100"
];

/* AUTO BUILD */
names.forEach((n,i)=>{
gameList.push({
title:"🍕 "+n,
categories:["arcade"],
url:"games/"+n.toLowerCase().replace(/ /g,"")+"/index.html",
img:"https://picsum.photos/400/250?random="+(id++)
});
});

/* LOAD */
function loadGames(list){
const grid=document.getElementById("games");
grid.innerHTML="";
list.forEach((g,i)=>{
grid.innerHTML+=`
<div class="card" onclick="playGame('${g.url}')">
<div class="tag">${g.categories[0]}</div>
<img src="${g.img}" onerror="this.src='${fallback}'+${i}">
<h3>${g.title}</h3>
</div>`;
});
}

/* FILTER */
function filterGames(cat){
if(cat==="all"){loadGames(gameList);return;}
loadGames(gameList.filter(g=>g.categories.includes(cat)));
}

/* SEARCH */
function searchGames(q){
q=q.toLowerCase();
loadGames(gameList.filter(g=>g.title.toLowerCase().includes(q)));
}

/* PLAYER */
function playGame(url){
document.getElementById("frame").src=url;
document.getElementById("player").style.display="block";
}
function closeGame(){
document.getElementById("player").style.display="none";
document.getElementById("frame").src="";
}

window.onload=()=>loadGames(gameList);
</script>

</body>
</html>
