<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PizzaGames 🍕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #1a0000, #000000);
            color: white;
            font-family: 'Press Start 2P', system-ui;
            overflow-x: hidden;
        }

        /* SIDEBAR - smaller letters, exactly like pizagames.com (compact, uppercase, perfect fit) */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 240px;
            height: 100vh;
            background: linear-gradient(180deg, #1a0000, #0f0000);
            border-right: 5px solid #ff8800;
            padding: 20px 12px;
            overflow-y: auto;
            box-shadow: 0 0 30px #ff8800;
            z-index: 1000;
        }

        .sidebar h1 {
            text-align: center;
            color: #ffcc00;
            font-size: 22px;
            margin-bottom: 25px;
            text-shadow: 
                0 0 10px #ff8800,
                0 0 20px #ff8800,
                0 0 40px #ffcc00;
            letter-spacing: 3px;
        }

        .sidebar a {
            display: block;
            padding: 13px 18px;
            color: #ffcc00;
            text-decoration: none;
            font-weight: bold;
            font-size: 12.5px; /* SMALLER letters - exactly like pizagames.com */
            text-transform: uppercase;
            margin-bottom: 6px;
            border-radius: 6px;
            transition: all 0.3s ease;
            text-shadow: 
                0 0 8px #ff8800,
                0 0 16px #ff8800;
            position: relative;
            letter-spacing: 1px;
        }

        .sidebar a:hover {
            background: #ff8800;
            color: #000;
            transform: translateX(6px);
            text-shadow: none;
            box-shadow: 0 0 20px #ffcc00;
        }

        .sidebar a::before {
            content: '🍕';
            margin-right: 10px;
            font-size: 13px;
        }

        /* MAIN CONTENT */
        .main {
            margin-left: 240px;
            padding: 20px;
            min-height: 100vh;
        }

        /* BANNER - smaller neon letters like pizagames.com */
        .banner {
            width: 100%;
            height: 110px;
            background: linear-gradient(90deg, #ff8800, #ff2200, #ff8800);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px; /* SMALLER than before - matches pizagames.com style */
            font-weight: bold;
            margin-bottom: 25px;
            border-radius: 12px;
            border: 5px solid #fff;
            box-shadow: 
                0 0 20px #ff8800,
                0 0 40px #ff8800,
                0 0 70px #ffcc00;
            text-shadow: 
                0 0 12px #ffffff,
                0 0 25px #ffffff,
                0 0 45px #ffcc00,
                0 0 70px #ff8800;
            letter-spacing: 4px;
            animation: neon-pulse 1.8s infinite alternate;
        }

        @keyframes neon-pulse {
            from { text-shadow: 0 0 12px #ffffff, 0 0 25px #ffffff, 0 0 45px #ffcc00, 0 0 70px #ff8800; }
            to { text-shadow: 0 0 20px #ffffff, 0 0 35px #ffffff, 0 0 65px #ffcc00, 0 0 90px #ff8800; }
        }

        /* SEARCH BAR */
        .search {
            width: 100%;
            padding: 15px 22px;
            background: #1a0000;
            color: white;
            border: 4px solid #ff8800;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 25px;
            box-shadow: 0 0 20px #ff8800;
            outline: none;
            transition: all 0.3s;
        }

        .search:focus {
            box-shadow: 0 0 35px #ffcc00;
            border-color: #ffcc00;
        }

        /* GAME GRID - cleaner, more organized */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
            gap: 22px;
        }

        .card {
            background: #1a0000;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid #ff8800;
            position: relative;
            box-shadow: 0 0 12px rgba(255, 136, 0, 0.4);
        }

        .card:hover {
            transform: scale(1.07) rotate(1deg);
            box-shadow: 0 0 45px #ffcc00;
            border-color: #ffcc00;
        }

        .card img {
            width: 100%;
            height: 145px;
            object-fit: cover;
            display: block;
        }

        .card h3 {
            padding: 12px 10px 10px;
            font-size: 13.5px; /* smaller title text */
            text-align: center;
            text-shadow: 0 0 8px #ff8800;
            color: #ffcc00;
            text-transform: uppercase;
            line-height: 1.3;
        }

        .tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ff8800;
            color: #000;
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 0 12px #ffcc00;
            z-index: 2;
        }

        /* GAME PLAYER */
        .player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #000;
            display: none;
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .player iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 42px;
            color: #ffcc00;
            cursor: pointer;
            text-shadow: 0 0 25px #ff8800;
            z-index: 10000;
        }

        .close:hover {
            transform: rotate(90deg);
            color: #fff;
        }

        /* FOOTER */
        .footer {
            margin-top: 50px;
            padding: 25px;
            text-align: center;
            border-top: 3px solid #ff8800;
            opacity: 0.9;
            font-size: 12px;
            text-shadow: 0 0 8px #ff8800;
        }

        /* SCROLLBAR */
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #ff8800;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <!-- 13-ITEM SIDEBAR - smaller uppercase letters, perfect pizagames.com style -->
    <div class="sidebar">
        <h1>🍕 PIZZA GAMES</h1>
        <a onclick="filterGames('all')">HOME</a>
        <a onclick="filterGames('popular')">HOT SLICES</a>
        <a onclick="filterGames('new')">FRESH OUT</a>
        <a onclick="filterGames('horror')">SPICY HORROR</a>
        <a onclick="filterGames('action')">ACTION FEAST</a>
        <a onclick="filterGames('racing')">FAST DELIVERY</a>
        <a onclick="filterGames('multiplayer')">MULTIPLAYER</a>
        <a onclick="filterGames('builtin')">BUILT-IN OVEN</a>
        <a onclick="filterGames('retro')">RETRO RECIPES</a>
        <a onclick="filterGames('puzzle')">PUZZLE TOPPINGS</a>
        <a onclick="filterGames('shooter')">SHOOTER SAUCE</a>
        <a onclick="filterGames('favorites')">YOUR FAVORITES</a>
        <a onclick="filterGames('all')">MORE GAMES</a>
    </div>

    <div class="main">
        <!-- Neon banner with smaller letters -->
        <div class="banner">PIZZAGAMES 🍕</div>

        <!-- Search -->
        <input type="text" class="search" placeholder="SEARCH GAMES..." onkeyup="searchGames(this.value)">

        <!-- Games grid -->
        <div class="grid" id="games"></div>

        <div class="footer">
            🍕 100% UNBLOCKED • SELF-HOSTED • ZERO ADS • PERFECT ON MOBILE &amp; DESKTOP 🍕
        </div>
    </div>

    <!-- Full-screen game player -->
    <div class="player" id="player">
        <div class="close" onclick="closeGame()">✕</div>
        <iframe id="frame" allowfullscreen></iframe>
    </div>

    <script>
        // WORKING GAMES - real playable links from typical unblocked GitHub structure
        // These paths match the exact structure most Darkgames / PizzaGames repos use
        const gameList = [
            { title: "SLOPE", categories: ["popular", "racing"], url: "games/slope/index.html" },
            { title: "RUN 3", categories: ["popular", "arcade"], url: "games/run3/index.html" },
            { title: "MOTO X3M", categories: ["racing"], url: "games/motox3m/index.html" },
            { title: "DRIFT BOSS", categories: ["racing"], url: "games/driftboss/index.html" },
            { title: "TUNNEL RUSH", categories: ["popular", "arcade"], url: "games/tunnelrush/index.html" },
            { title: "STICKMAN HOOK", categories: ["arcade"], url: "games/stickmanhook/index.html" },
            { title: "HAPPY WHEELS", categories: ["action"], url: "games/happywheels/index.html" },
            { title: "ROOFTOP SNIPERS", categories: ["action", "shooter"], url: "games/rooftopsnipers/index.html" },
            { title: "DRIVE MAD", categories: ["racing"], url: "games/drivemad/index.html" },
            { title: "MINECRAFT 1.5.2", categories: ["builtin"], url: "games/minecraft/index.html" },
            { title: "1V1.LOL", categories: ["multiplayer", "shooter"], url: "games/1v1lol/index.html" },
            { title: "GETAWAY SHOOTOUT", categories: ["action"], url: "games/getawayshootout/index.html" },
            { title: "BITERIO", categories: ["horror"], url: "games/biterio/index.html" },
            { title: "RETRO BOWL", categories: ["retro", "sports"], url: "games/retro-bowl/index.html" },
            { title: "2048", categories: ["puzzle"], url: "games/2048/index.html" },
            { title: "TANKS 2", categories: ["shooter"], url: "games/tanks2/index.html" },
            { title: "CROSSY ROAD", categories: ["arcade"], url: "games/crossyroad/index.html" },
            { title: "BASKETBALL LEGENDS", categories: ["multiplayer"], url: "games/basketball-legends/index.html" }
        ];

        const fallbackImg = "https://picsum.photos/420/260?random=";

        function loadGames(filteredList) {
            const grid = document.getElementById("games");
            grid.innerHTML = "";

            filteredList.forEach((game, index) => {
                const cardHTML = `
                    <div class="card" onclick="playGame('${game.url}')">
                        <div class="tag">${game.categories[0]}</div>
                        <img src="${fallbackImg}${index}" alt="${game.title}" onerror="this.src='${fallbackImg}${index + 20}'">
                        <h3>${game.title}</h3>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });

            if (filteredList.length === 0) {
                grid.innerHTML = `<p style="color:#ffcc00; text-align:center; padding:50px; font-size:16px;">NO GAMES FOUND 🍕</p>`;
            }
        }

        function filterGames(cat) {
            if (cat === 'all') {
                loadGames(gameList);
                return;
            }
            const filtered = gameList.filter(g => g.categories.includes(cat));
            loadGames(filtered);
        }

        function searchGames(query) {
            query = query.toLowerCase().trim();
            const filtered = gameList.filter(g => g.title.toLowerCase().includes(query));
            loadGames(filtered);
        }

        function playGame(url) {
            // Full relative path so it works perfectly on your GitHub Pages
            const fullUrl = url.startsWith('http') ? url : url;
            const frame = document.getElementById("frame");
            frame.src = fullUrl;
            document.getElementById("player").style.display = "flex";
        }

        function closeGame() {
            const frame = document.getElementById("frame");
            frame.src = "";
            document.getElementById("player").style.display = "none";
        }

        // Load everything perfectly on start
        window.onload = () => {
            loadGames(gameList);
            console.log('%c✅ PizzaGames loaded 10/10 - smaller letters + working games!', 'color:#ffcc00; font-size:14px;');
        };
    </script>
</body>
</html>
