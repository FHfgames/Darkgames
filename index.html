<!DOCTYPE html>
<html>
<head>
<title>DarkPlay</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#111;
}

.search{
padding:10px;
border-radius:20px;
border:none;
width:250px;
background:#222;
color:white;
}

/* SIDEBAR */
.container{display:flex;}

.sidebar{
width:200px;
background:#111;
height:100vh;
padding:15px;
}

.menu{
padding:10px;
border-radius:10px;
margin-bottom:8px;
cursor:pointer;
transition:0.2s;
}

.menu:hover{background:#222;}
.active{background:#ff3c3c;}

/* MAIN */
.main{flex:1;padding:20px;}

/* HERO */
.hero{
background:#1a1a1a;
padding:30px;
border-radius:15px;
margin-bottom:20px;
}

.hero h1{
font-size:40px;
margin:0;
}

.hero p{
opacity:0.7;
}

.hero button{
padding:10px 15px;
margin-top:10px;
border:none;
border-radius:10px;
background:#ff3c3c;
color:white;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
}

.card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{transform:scale(1.05);}

.card img{
width:100%;
height:100px;
object-fit:cover;
}

.card p{
text-align:center;
font-size:13px;
padding:5px;
}

/* PLAYER */
iframe{
width:100%;
height:450px;
border:none;
border-radius:10px;
margin-bottom:15px;
}

/* BUTTONS */
.btn{
padding:8px 12px;
border:none;
border-radius:8px;
background:#ff3c3c;
color:white;
cursor:pointer;
margin:5px;
}
</style>

</head>

<body>

<div class="topbar">
<input class="search" placeholder="Search games..." onkeyup="searchGames(this.value)">
<div>
<button class="btn">Submit</button>
<button class="btn">Sign In</button>
</div>
</div>

<div class="container">

<div class="sidebar">
<div class="menu active" onclick="show('all',this)">Home</div>
<div class="menu" onclick="show('popular',this)">Popular</div>
<div class="menu" onclick="show('action',this)">Action</div>
<div class="menu" onclick="show('arcade',this)">Arcade</div>
<div class="menu" onclick="show('racing',this)">Driving</div>
</div>

<div class="main">

<div class="hero">
<h1>Play 1000+ Games</h1>
<p>Free games. No downloads. Fullscreen ready.</p>
<button onclick="show('popular')">Popular Now</button>
</div>

<div>
<button class="btn" onclick="fullscreen()">Fullscreen</button>
<button class="btn" onclick="clearGame()">Close</button>
</div>

<iframe id="game"></iframe>

<div class="grid" id="games"></div>

</div>
</div>

<script>

const games = [

["Drive Mad","popular","https://www.crazygames.com/embed/drive-mad","https://images.crazygames.com/games/drive-mad/cover.png"],
["Slope","popular","https://www.crazygames.com/embed/slope","https://images.crazygames.com/games/slope/cover.png"],
["Run 3","popular","https://www.crazygames.com/embed/run-3","https://images.crazygames.com/games/run-3/cover.png"],
["Moto X3M","racing","https://www.crazygames.com/embed/moto-x3m","https://images.crazygames.com/games/moto-x3m/cover.png"],
["Tunnel Rush","arcade","https://www.crazygames.com/embed/tunnel-rush","https://images.crazygames.com/games/tunnel-rush/cover.png"],
["Stickman Hook","action","https://www.crazygames.com/embed/stickman-hook","https://images.crazygames.com/games/stickman-hook/cover.png"],
["OvO","action","https://www.crazygames.com/embed/ovo","https://images.crazygames.com/games/ovo/cover.png"],
["Basketball Stars","action","https://www.crazygames.com/embed/basketball-stars","https://images.crazygames.com/games/basketball-stars/cover.png"],
["Smash Karts","arcade","https://www.crazygames.com/embed/smash-karts","https://images.crazygames.com/games/smash-karts/cover.png"],
["Drift Hunters","racing","https://www.crazygames.com/embed/drift-hunters","https://images.crazygames.com/games/drift-hunters/cover.png"]

];

function load(url){
document.getElementById("game").src=url;
}

function fullscreen(){
let iframe=document.getElementById("game");
if(iframe.requestFullscreen) iframe.requestFullscreen();
}

function clearGame(){
document.getElementById("game").src="";
}

function display(list){
let html="";
list.forEach(g=>{
html+=`<div class="card" onclick="load('${g[2]}')">
<img src="${g[3]}">
<p>${g[0]}</p>
</div>`;
});
document.getElementById("games").innerHTML=html;
}

function show(type,el){

document.querySelectorAll(".menu").forEach(m=>m.classList.remove("active"));
if(el) el.classList.add("active");

if(type==="all"){
display(games);
}else{
display(games.filter(g=>g[1]===type));
}

window.scrollTo({top:300,behavior:"smooth"});
}

function searchGames(text){
text=text.toLowerCase();
display(games.filter(g=>g[0].toLowerCase().includes(text)));
}

display(games);

</script>

</body>
</html>
