<!DOCTYPE html>
<html>
<head>
<title>DarkPlay</title>

<style>
body {
  margin:0;
  background:#1a0000;
  color:#fff;
  font-family:Arial;
}

/* Header */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 15px;
  background:#330000;
  font-size:18px;
}

.logo {font-weight:bold;}

/* Search */
.search {
  padding:6px;
  border-radius:6px;
  border:none;
  width:180px;
  font-size:12px;
}

/* Layout */
.container {display:flex;}

/* Sidebar */
.sidebar {
  width:170px;
  background:#220000;
  height:100vh;
  padding:8px;
  font-size:13px;
}

.sidebar div {
  padding:8px;
  cursor:pointer;
  border-radius:6px;
}

.sidebar div:hover {background:#440000;}

/* Main */
.main {flex:1;}

/* Player */
.player {padding:8px;}

iframe {
  width:100%;
  height:480px;
  border:none;
  border-radius:8px;
}

/* Controls */
.controls {margin:8px;}

button {
  padding:6px 10px;
  margin:4px;
  border:none;
  border-radius:6px;
  background:#ff1a1a;
  color:white;
  font-size:12px;
  cursor:pointer;
}

/* Grid */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px;
  padding:15px;
}

.card {
  background:#330000;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.card:hover {transform:scale(1.04);}

.card img {
  width:100%;
  height:90px;
  object-fit:cover;
}

.card p {
  text-align:center;
  padding:5px;
  font-size:12px;
}
</style>

</head>

<body>

<header>
  <div class="logo">DarkPlay</div>
  <input class="search" placeholder="Search..." onkeyup="searchGames(this.value)">
</header>

<div class="container">

<div class="sidebar">
  <div onclick="show('all')">All</div>
  <div onclick="show('popular')">Popular</div>
  <div onclick="show('action')">Action</div>
  <div onclick="show('arcade')">Arcade</div>
  <div onclick="show('racing')">Racing</div>
</div>

<div class="main">

<div class="player">
  <div class="controls">
    <button onclick="fullscreen()">Fullscreen</button>
    <button onclick="clearGame()">Close</button>
  </div>
  <iframe id="game"></iframe>
</div>

<div class="grid" id="games"></div>

</div>
</div>
