<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DarkGames Pro</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND DOTS */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  width:230px;
  height:100%;
  background:#0a0a0a;
}

.sidebar a {
  display:block;
  padding:12px;
  color:#ff2e2e;
  text-decoration:none;
  font-weight:bold;
}

.sidebar a:hover {
  color:white;
  text-shadow:0 0 10px red;
}

/* MAIN */
.main {
  margin-left:240px;
  padding:20px;
}

/* SEARCH */
.search {
  padding:10px;
  width:300px;
  border:none;
  border-radius:5px;
}

/* GRID */
.games {
  display:grid;
  grid-template-columns:repeat(auto-fill,200px);
  gap:20px;
  margin-top:20px;
}

.game {
  height:120px;
  border-radius:10px;
  background-size:cover;
  display:flex;
  align-items:end;
  padding:10px;
  cursor:pointer;
  transition:.3s;
}

.game:hover {
  transform:scale(1.05);
  box-shadow:0 0 15px red;
}

/* PLAYER */
#player {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
}

iframe {
  width:100%;
  height:90%;
  border:none;
}

.controls {
  text-align:center;
}

/* BUTTONS */
button {
  padding:10px;
  margin:5px;
  background:red;
  border:none;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="sidebar">
<a onclick="filter('all')">Home</a>
<a onclick="filter('popular')">Popular</a>
<a onclick="filter('new')">New</a>
<a onclick="filter('action')">Action</a>
<a onclick="filter('shooting')">Shooting</a>
<a onclick="filter('racing')">Racing</a>
<a onclick="filter('multi')">Multiplayer</a>
<a onclick="filter('horror')">Horror</a>
<a onclick="filter('puzzle')">Puzzle</a>
<a onclick="filter('sports')">Sports</a>
<a onclick="filter('built')">Built-in</a>
<a onclick="showFavorites()">Favorites</a>
<a onclick="showRecent()">Recent</a>
</div>

<div class="main">
<h1>🔥 DarkGames</h1>
<p>✔ Safe ✔ No downloads ✔ Works anywhere ✔ Instant play</p>

<input class="search" placeholder="Search..." onkeyup="search(this.value)">

<div class="games" id="games">

<!-- GAMES -->
<script>
let games = [
{name:"Slope",cat:"popular",url:"https://ubg100.github.io/slope/"},
{name:"Run 3",cat:"popular",url:"https://ubg100.github.io/run3/"},
{name:"Drift Boss",cat:"racing",url:"https://ubg100.github.io/drift-boss/"},
{name:"1v1.lol",cat:"shooting",url:"https://ubg100.github.io/1v1-lol/"},
{name:"Tunnel Rush",cat:"action",url:"https://ubg100.github.io/tunnelrush/"},
{name:"Basketball Stars",cat:"sports",url:"https://ubg100.github.io/basketball-stars/"},
{name:"Moto X3M",cat:"racing",url:"https://ubg100.github.io/motox3m/"},
{name:"Snake",cat:"built",url:"snake.html"}
];

let container = document.getElementById("games");

function loadGames(list){
container.innerHTML="";
list.forEach(g=>{
let div=document.createElement("div");
div.className="game";
div.style.backgroundImage="url('https://via.placeholder.com/200x120')";
div.innerHTML="<span>"+g.name+"</span>";
div.onclick=()=>openGame(g.url);
container.appendChild(div);
});
}
loadGames(games);

/* FILTER */
function filter(cat){
if(cat=="all"){loadGames(games);return;}
loadGames(games.filter(g=>g.cat==cat));
}

/* SEARCH */
function search(input){
input=input.toLowerCase();
loadGames(games.filter(g=>g.name.toLowerCase().includes(input)));
}

/* PLAYER */
let current="";
function openGame(url){
document.getElementById("player").style.display="block";
document.getElementById("frame").src=url;
current=url;

let recent=JSON.parse(localStorage.getItem("recent")||"[]");
recent.unshift(url);
localStorage.setItem("recent",JSON.stringify(recent.slice(0,10)));
}

function closeGame(){
document.getElementById("player").style.display="none";
document.getElementById("frame").src="";
}

function fullscreen(){
document.getElementById("frame").requestFullscreen();
}

/* FAVORITES */
function fav(){
let f=JSON.parse(localStorage.getItem("fav")||"[]");
if(!f.includes(current)){
f.push(current);
localStorage.setItem("fav",JSON.stringify(f));
alert("Saved ⭐");
}
}

function showFavorites(){
let f=JSON.parse(localStorage.getItem("fav")||"[]");
loadGames(games.filter(g=>f.includes(g.url)));
}

/* RECENT */
function showRecent(){
let r=JSON.parse(localStorage.getItem("recent")||"[]");
loadGames(games.filter(g=>r.includes(g.url)));
}
</script>

</div>
</div>

<!-- PLAYER -->
<div id="player">
<iframe id="frame"></iframe>
<div class="controls">
<button onclick="closeGame()">Close</button>
<button onclick="fullscreen()">Fullscreen</button>
<button onclick="fav()">⭐ Favorite</button>
</div>
</div>

<!-- BACKGROUND ANIMATION -->
<script>
let c=document.getElementById("bg");
let ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let dots=[];
for(let i=0;i<100;i++){
dots.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="rgba(255,0,0,0.35)";
dots.forEach(d=>{
ctx.beginPath();
ctx.arc(d.x,d.y,2,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
