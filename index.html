<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DarkGames HYBRID</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:white;}
#sidebar{width:200px;position:fixed;height:100%;background:#111;padding:10px;}
.sidebar-item{margin:8px 0;cursor:pointer;color:#0ff;}
.sidebar-item.active{color:#fff;}
#main{margin-left:210px;padding:10px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
}

.game{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}
.game:hover{transform:scale(1.05);}

.game img{
width:100%;
height:110px;
object-fit:cover;
}

.game-title{padding:6px;font-size:13px;}

#player{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:black;
display:none;
}
#player iframe{width:100%;height:100%;border:none;}

#closeBtn{
position:absolute;
top:10px;
right:10px;
background:red;
border:none;
padding:10px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div id="sidebar">
<div class="sidebar-item active" onclick="tab('home',this)">Home</div>
<div class="sidebar-item" onclick="tab('action',this)">Action</div>
<div class="sidebar-item" onclick="tab('racing',this)">Racing</div>
<div class="sidebar-item" onclick="tab('arcade',this)">Arcade</div>
</div>

<div id="main">
<div id="home" class="grid"></div>
<div id="action" class="grid"></div>
<div id="racing" class="grid"></div>
<div id="arcade" class="grid"></div>
</div>

<div id="player">
<button id="closeBtn" onclick="closeGame()">❌</button>
<iframe id="frame"></iframe>
</div>

<script>

/* TAB */
function tab(id,el){
document.querySelectorAll("#main > div").forEach(d=>d.style.display="none");
document.getElementById(id).style.display="grid";
document.querySelectorAll(".sidebar-item").forEach(i=>i.classList.remove("active"));
if(el) el.classList.add("active");
}

/* CLOSE */
function closeGame(){
player.style.display="none";
frame.src="";
tab("home",document.querySelector(".sidebar-item"));
}

/* PERFECT MATCH THUMBNAILS */
const thumbMap={
"slope":"https://images.crazygames.com/games/slope/cover-1584478910518.png",
"run-3":"https://images.crazygames.com/games/run-3/cover-1584478606153.png",
"drift-hunters":"https://images.crazygames.com/games/drift-hunters/cover-1593791675999.png",
"moto-x3m":"https://images.crazygames.com/games/moto-x3m/cover-1584479006462.png",
"crossy-road":"https://images.crazygames.com/games/crossy-road/cover-1584478644688.png"
};

/* DUCKDUCKGO FETCH */
async function fetchDuck(name){
try{
let res=await fetch(`https://duckduckgo.com/i.js?q=${name} game&iax=images&ia=images`);
let data=await res.json();
if(data.results && data.results.length>0){
return data.results[0].image;
}
}catch(e){}
return null;
}

/* HYBRID THUMB SYSTEM */
async function getThumbnail(name,url){

/* 1. perfect map */
if(thumbMap[name]) return thumbMap[name];

/* 2. duckduckgo */
let duck=await fetchDuck(name);
if(duck) return duck;

/* 3. clearbit fallback */
try{
let domain=new URL(url).hostname;
return `https://logo.clearbit.com/${domain}`;
}catch(e){}

/* 4. final fallback */
return `https://via.placeholder.com/300x200?text=${name}`;
}

/* ADD GAME */
async function addGame(section,name){

let d=document.createElement("div");
d.className="game";

let img=document.createElement("img");
img.src="https://via.placeholder.com/300x200?text=Loading...";

let url=`https://ubg365.github.io/${name}/`;

/* LOAD THUMB */
getThumbnail(name,url).then(src=>{
img.src=src;
});

/* FAILSAFE */
img.onerror=()=>{
img.src=`https://via.placeholder.com/300x200?text=${name}`;
};

let title=document.createElement("div");
title.className="game-title";
title.innerText=name;

/* PLAY */
d.onclick=()=>{
player.style.display="block";
frame.src=url;
};

d.appendChild(img);
d.appendChild(title);

document.getElementById(section).appendChild(d);
}

/* DATA */
const data={
action:["slope","run-3","vex-6","vex-7","ovo"],
racing:["drift-hunters","moto-x3m","drive-mad","drift-boss","kart-racing"],
arcade:["crossy-road","flappy-bird","fruit-ninja","doodle-jump","paper-io"]
};

/* LOAD */
Object.keys(data).forEach(cat=>{
data[cat].forEach(g=>{
addGame("home",g);
addGame(cat,g);
});
});

</script>

</body>
</html>
