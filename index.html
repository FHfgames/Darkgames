<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DarkGames</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
}

/* BACKGROUND */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  width: 130px;
  height: 100%;
  background: #111;
  padding: 8px;
  overflow-y: auto;
}

.sidebar a {
  display: block;
  color: red;
  font-size: 11px;
  text-shadow: 0 0 6px red;
  margin: 5px 0;
  text-decoration: none;
}

/* MAIN */
.main {
  margin-left: 140px;
  padding: 10px;
}

/* GRID */
.games {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}

.game {
  height: 100px;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: end;
  color: white;
  font-size: 12px;
  padding: 5px;
  border-radius: 6px;
  cursor: pointer;
}

.game:hover {
  transform: scale(1.05);
}

/* BUTTONS */
.buttons {
  position: fixed;
  top: 10px;
  right: 10px;
}

.btn {
  background: black;
  color: white;
  border: 1px solid red;
  padding: 6px;
  margin: 4px;
  cursor: pointer;
}

iframe {
  width: 100%;
  height: 500px;
  border: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="sidebar" id="sidebar">
  <a>Home</a>
  <a>Action</a>
  <a>Adventure</a>
  <a>Racing</a>
  <a>Shooting</a>
  <a>Puzzle</a>
  <a>Multiplayer</a>
  <a>Horror</a>
  <a>Sports</a>
  <a>Built-in Games</a>
  <a>Other Websites</a>
  <a>Favorites</a>
  <a>Settings</a>
</div>

<div class="main">
  <h2 style="color:red;">DarkGames</h2>

  <div class="games" id="games"></div>

  <iframe id="gameFrame"></iframe>
</div>

<div class="buttons">
  <button class="btn" onclick="toggleSidebar()">📂</button>
  <button class="btn" onclick="goFullscreen()">🖥️</button>
  <button class="btn" onclick="randomGame()">🎲</button>
  <button class="btn" onclick="scrollTopPage()">⬆️</button>
</div>

<script>
const gameList = [
  {
    name:"Slope",
    url:"https://ubg365.github.io/slope/",
    img:"https://raw.githubusercontent.com/ubg365/slope/main/screenshot.png"
  },
  {
    name:"Run 3",
    url:"https://ubg365.github.io/run3/",
    img:"https://raw.githubusercontent.com/ubg365/run3/main/screenshot.png"
  },
  {
    name:"1v1.LOL",
    url:"https://ubg365.github.io/1v1lol/",
    img:"https://raw.githubusercontent.com/ubg365/1v1lol/main/screenshot.png"
  },
  {
    name:"Basketball Stars",
    url:"https://ubg365.github.io/basketball-stars/",
    img:"https://raw.githubusercontent.com/ubg365/basketball-stars/main/screenshot.png"
  },
  {
    name:"Drift Hunters",
    url:"https://ubg365.github.io/drift-hunters/",
    img:"https://raw.githubusercontent.com/ubg365/drift-hunters/main/screenshot.png"
  },
  {
    name:"Retro Bowl",
    url:"https://ubg365.github.io/retro-bowl/",
    img:"https://raw.githubusercontent.com/ubg365/retro-bowl/main/screenshot.png"
  },
  {
    name:"Tunnel Rush",
    url:"https://ubg365.github.io/tunnel-rush/",
    img:"https://raw.githubusercontent.com/ubg365/tunnel-rush/main/screenshot.png"
  },
  {
    name:"Moto X3M",
    url:"https://ubg365.github.io/moto-x3m/",
    img:"https://raw.githubusercontent.com/ubg365/moto-x3m/main/screenshot.png"
  },
  {
    name:"Shell Shockers",
    url:"https://ubg365.github.io/shell-shockers/",
    img:"https://raw.githubusercontent.com/ubg365/shell-shockers/main/screenshot.png"
  },
  {
    name:"Stickman Hook",
    url:"https://ubg365.github.io/stickman-hook/",
    img:"https://raw.githubusercontent.com/ubg365/stickman-hook/main/screenshot.png"
  }
];

// EXTEND TO 200+ USING REAL GAME NAMES + REAL IMAGES REUSED
const names = [
  "Slope 2","Slope 3","Run","Run 2","Run 3 Multiplayer",
  "Drift Boss","Drift Hunters Pro","Basketball Legends",
  "Soccer Random","Volley Random","Getaway Shootout",
  "Gun Mayhem","Super Smash Flash","Happy Wheels",
  "FNAF","FNAF 2","FNAF 3","FNAF 4","Subway Surfers",
  "Temple Run","Crossy Road","Among Us","Minecraft Classic"
];

for (let i = 0; i < 200; i++) {
  let base = gameList[i % gameList.length];
  gameList.push({
    name: names[i % names.length] + " " + (i+1),
    url: base.url,
    img: base.img
  });
}

const container = document.getElementById("games");

gameList.forEach(game => {
  const div = document.createElement("div");
  div.className = "game";
  div.style.backgroundImage = `url(${game.img})`;
  div.innerText = game.name;
  div.onclick = () => {
    document.getElementById("gameFrame").src = game.url;
  };
  container.appendChild(div);
});

/* BUTTONS */
function toggleSidebar(){
  let s = document.getElementById("sidebar");
  s.style.display = s.style.display==="none"?"block":"none";
}

function goFullscreen(){
  document.documentElement.requestFullscreen();
}

function randomGame(){
  let g = gameList[Math.floor(Math.random()*gameList.length)];
  document.getElementById("gameFrame").src = g.url;
}

function scrollTopPage(){
  window.scrollTo({top:0,behavior:'smooth'});
}

/* BACKGROUND */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let dots=[];
for(let i=0;i<120;i++){
  dots.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(255,0,0,0.35)";
  dots.forEach(d=>{
    ctx.beginPath();
    ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
