<!DOCTYPE html>
<html>
<head>
<title>DarkPlay</title>

<style>
body {
  margin:0;
  background:#0f172a;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}

header {
  padding:20px;
  font-size:30px;
  background:#020617;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
}

.card:hover {
  background:#334155;
}
</style>

</head>

<body>

<header>DarkPlay 🎮</header>

<div class="grid">

<div class="card" onclick="play('https://www.crazygames.com/game/drive-mad')">Drive Mad</div>

<div class="card" onclick="play('https://www.crazygames.com/game/space-waves')">Space Waves</div>

<div class="card" onclick="play('https://www.crazygames.com/game/slope')">Slope</div>

<div class="card" onclick="play('https://www.crazygames.com/game/run-3')">Run 3</div>

<div class="card" onclick="play('https://www.crazygames.com/game/moto-x3m')">Moto X3M</div>

<div class="card" onclick="play('https://www.crazygames.com/game/tunnel-rush')">Tunnel Rush</div>

<div class="card" onclick="play('https://www.crazygames.com/game/ovo')">OvO</div>

<div class="card" onclick="play('https://www.crazygames.com/game/stickman-hook')">Stickman Hook</div>

<div class="card" onclick="play('https://www.crazygames.com/game/basketball-stars')">Basketball Stars</div>

<div class="card" onclick="play('https://www.crazygames.com/game/1v1-lol')">1v1.LOL</div>

</div>

<script>
function play(url) {
  window.open(url, "_blank");
}
</script>

</body>
</html>
