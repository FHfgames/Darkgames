<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DarkGames</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  width: 220px;
  height: 100%;
  background: #111;
  padding-top: 20px;
}

.sidebar h2 {
  text-align: center;
  color: red;
}

.sidebar a {
  display: block;
  padding: 12px;
  color: #aaa;
  text-decoration: none;
  transition: 0.2s;
}

.sidebar a:hover {
  background: red;
  color: white;
}

/* TOPBAR */
.topbar {
  margin-left: 220px;
  padding: 15px;
  background: #111;
}

.search {
  width: 100%;
  padding: 10px;
  background: #222;
  border: none;
  color: white;
}

/* GRID */
.container {
  margin-left: 220px;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
}

.game {
  background: #1a1a1a;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.25s;
}

.game:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px red;
}

.game img {
  width: 100%;
  height: 110px;
  object-fit: cover;
}

.game p {
  text-align: center;
  padding: 8px;
  font-size: 14px;
}

/* SCROLLBAR */
::-webkit-scrollbar {
  width: 8px;
}
::-webkit-scrollbar-thumb {
  background: red;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🎮 DarkGames</h2>

  <a href="#">Home</a>
  <a href="#">Popular</a>
  <a href="#">New</a>
  <a href="#">Action</a>
  <a href="#">Shooting</a>
  <a href="#">Racing</a>
  <a href="#">Puzzle</a>
  <a href="#">Sports</a>
  <a href="#">Multiplayer</a>
  <a href="#">IO Games</a>
  <a href="#">Built-in Games</a>
  <a href="#">Favorites</a>
  <a href="#">Random</a>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <input class="search" id="search" placeholder="Search games...">
</div>

<!-- GAMES -->
<div class="container">
  <div class="grid" id="grid"></div>
</div>

<script>
function openGame(url) {
  window.location.href = url;
}

/* GAME LIST */
const games = [
  {name: "Slope", file: "games/slope.html", img: "https://i.imgur.com/1XqQZ6M.jpg"},
  {name: "Run 3", file: "games/run3.html", img: "https://i.imgur.com/3ZQ3Z6M.jpg"},
  {name: "1v1.LOL", file: "games/1v1lol.html", img: "https://i.imgur.com/abc123.jpg"},
  {name: "Drift Hunters", file: "games/drift.html", img: "https://i.imgur.com/xyz123.jpg"},
  {name: "Basketball Stars", file: "games/basketball.html", img: "https://i.imgur.com/456abc.jpg"},
  {name: "Retro Bowl", file: "games/retro.html", img: "https://i.imgur.com/retro.jpg"},
  {name: "Subway Surfers", file: "games/subway.html", img: "https://i.imgur.com/subway.jpg"}
];

/* LOAD GAMES */
const grid = document.getElementById("grid");

function displayGames(list) {
  grid.innerHTML = "";
  list.forEach(game => {
    grid.innerHTML += `
      <div class="game" onclick="openGame('${game.file}')">
        <img src="${game.img}">
        <p>${game.name}</p>
      </div>
    `;
  });
}

displayGames(games);

/* SEARCH SYSTEM */
document.getElementById("search").addEventListener("input", function() {
  const value = this.value.toLowerCase();
  const filtered = games.filter(g =>
    g.name.toLowerCase().includes(value)
  );
  displayGames(filtered);
});
</script>

</body>
</html>
