<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DarkGames</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* RED DOT BACKGROUND */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  width:120px;
  height:100%;
  background:#0a0a0a;
  padding:6px;
  overflow-y:auto;
  transition:0.3s;
}

.sidebar a{
  display:block;
  color:#ff2a2a;
  font-size:10px;
  margin:6px 0;
  text-decoration:none;
  text-shadow:0 0 6px red;
}

.sidebar a:hover{
  color:white;
}

/* MAIN */
.main{
  margin-left:130px;
  padding:10px;
}

/* GRID */
.games{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px;
}

.game{
  height:100px;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:end;
  padding:5px;
  font-size:11px;
  border-radius:6px;
  cursor:pointer;
}

.game:hover{
  transform:scale(1.05);
}

/* BUTTONS */
.buttons{
  position:fixed;
  top:10px;
  right:10px;
}

.btn{
  background:black;
  border:1px solid red;
  color:white;
  padding:6px;
  margin:3px;
  cursor:pointer;
}

/* FRAME */
iframe{
  width:100%;
  height:500px;
  border:none;
  margin-top:10px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- SIDEBAR (13 ITEMS) -->
<div class="sidebar" id="sidebar">
<a>Home</a>
<a>Action</a>
<a>Adventure</a>
<a>Racing</a>
<a>Shooting</a>
<a>Puzzle</a>
<a>Multiplayer</a>
<a>Horror</a>
<a>Sports</a>
<a>Built-in Games</a>
<a>Other Websites</a>
<a>Favorites</a>
<a>Settings</a>
</div>

<div class="main">
<h2 style="color:red;">DarkGames</h2>

<div class="games" id="games"></div>

<iframe id="frame"></iframe>

<h3>Other Websites</h3>
<div id="sites"></div>

</div>

<!-- BUTTONS -->
<div class="buttons">
<button class="btn" onclick="toggleSidebar()">📂</button>
<button class="btn" onclick="fullscreen()">🖥️</button>
<button class="btn" onclick="randomGame()">🎲</button>
<button class="btn" onclick="scrollTopPage()">⬆️</button>
</div>

<script>

/* REAL GAMES */
const games = [
{name:"Slope",url:"https://ubg365.github.io/slope/",img:"https://raw.githubusercontent.com/ubg365/slope/main/screenshot.png"},
{name:"Run 3",url:"https://ubg365.github.io/run3/",img:"https://raw.githubusercontent.com/ubg365/run3/main/screenshot.png"},
{name:"1v1.LOL",url:"https://ubg365.github.io/1v1lol/",img:"https://raw.githubusercontent.com/ubg365/1v1lol/main/screenshot.png"},
{name:"Basketball Stars",url:"https://ubg365.github.io/basketball-stars/",img:"https://raw.githubusercontent.com/ubg365/basketball-stars/main/screenshot.png"},
{name:"Drift Hunters",url:"https://ubg365.github.io/drift-hunters/",img:"https://raw.githubusercontent.com/ubg365/drift-hunters/main/screenshot.png"},
{name:"Retro Bowl",url:"https://ubg365.github.io/retro-bowl/",img:"https://raw.githubusercontent.com/ubg365/retro-bowl/main/screenshot.png"},
{name:"Tunnel Rush",url:"https://ubg365.github.io/tunnel-rush/",img:"https://raw.githubusercontent.com/ubg365/tunnel-rush/main/screenshot.png"},
{name:"Moto X3M",url:"https://ubg365.github.io/moto-x3m/",img:"https://raw.githubusercontent.com/ubg365/moto-x3m/main/screenshot.png"},
{name:"Stickman Hook",url:"https://ubg365.github.io/stickman-hook/",img:"https://raw.githubusercontent.com/ubg365/stickman-hook/main/screenshot.png"}
];

/* GENERATE 200+ */
for(let i=0;i<220;i++){
let g=games[i%games.length];
games.push({
name:g.name+" "+(i+1),
url:g.url,
img:g.img
});
}

/* RENDER */
const container=document.getElementById("games");

function openGame(url){
let frame=document.getElementById("frame");
frame.src=url;

/* fallback */
setTimeout(()=>{
try{
if(!frame.contentWindow || frame.contentWindow.location.href==="about:blank"){
window.open(url,"_blank");
}
}catch{
window.open(url,"_blank");
}
},1200);
}

games.forEach(g=>{
let div=document.createElement("div");
div.className="game";
div.style.backgroundImage=`url(${g.img})`;
div.innerText=g.name;
div.onclick=()=>openGame(g.url);
container.appendChild(div);
});

/* BUTTONS */
function toggleSidebar(){
let s=document.getElementById("sidebar");
s.style.display=s.style.display==="none"?"block":"none";
}

function fullscreen(){
document.documentElement.requestFullscreen();
}

function randomGame(){
let g=games[Math.floor(Math.random()*games.length)];
openGame(g.url);
}

function scrollTopPage(){
window.scrollTo({top:0,behavior:"smooth"});
}

/* OTHER WEBSITES (SCALABLE LIST) */
const sites=document.getElementById("sites");

const siteList=[
"https://ubg365.github.io/",
"https://sites.google.com/view/unblockedgames66ez/",
"https://mathgames66.github.io/",
"https://classroom6x.org/"
];

/* duplicate to large list */
for(let i=0;i<200;i++){
let a=document.createElement("a");
a.href=siteList[i%siteList.length];
a.innerText="Game Site "+(i+1);
a.style.display="block";
a.style.color="red";
a.style.fontSize="10px";
a.target="_blank";
sites.appendChild(a);
}

/* BACKGROUND */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let dots=[];
for(let i=0;i<150;i++){
dots.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:2
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(255,0,0,0.35)";
dots.forEach(d=>{
ctx.beginPath();
ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
