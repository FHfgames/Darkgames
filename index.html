<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DarkGames X</title>

<style>
:root {
  --red:#ff2e2e;
}

body {
  margin:0;
  font-family:Arial;
  background:#050505;
  color:white;
}

/* SMALL SIDEBAR */
.sidebar {
  position:fixed;
  width:160px;
  height:100%;
  background:#0a0a0a;
  padding-top:10px;
  overflow-y:auto;
}

.sidebar a {
  display:block;
  padding:10px;
  font-size:14px;
  color:var(--red);
  text-decoration:none;
}

.sidebar a:hover {
  color:white;
  text-shadow:0 0 10px red;
}

/* MAIN */
.main {
  margin-left:170px;
  padding:15px;
}

/* TOP BAR */
.topbar {
  display:flex;
  gap:10px;
  align-items:center;
}

.search {
  flex:1;
  padding:10px;
  border-radius:6px;
  border:none;
}

button {
  padding:8px 12px;
  background:var(--red);
  border:none;
  color:white;
  cursor:pointer;
}

/* GRID */
.games {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  margin-top:15px;
}

.card {
  height:110px;
  border-radius:8px;
  background-size:cover;
  display:flex;
  align-items:end;
  padding:8px;
  cursor:pointer;
  transition:.25s;
  position:relative;
}

.card:hover {
  transform:scale(1.06);
  box-shadow:0 0 20px red;
}

.tag {
  position:absolute;
  top:5px;
  left:5px;
  font-size:10px;
  background:red;
  padding:2px 5px;
  border-radius:3px;
}

/* PLAYER */
#player {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
}

iframe {
  width:100%;
  height:92%;
  border:none;
}

.controls {
  text-align:center;
  padding:5px;
}

/* LOADER */
#loader {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

/* SCROLLBAR */
::-webkit-scrollbar {
  width:6px;
}
::-webkit-scrollbar-thumb {
  background:red;
}
</style>
</head>

<body>

<div class="sidebar">
<a onclick="setView('all')">Home</a>
<a onclick="setView('popular')">🔥 Popular</a>
<a onclick="setView('new')">🆕 New</a>
<a onclick="setView('action')">Action</a>
<a onclick="setView('shooting')">Shooting</a>
<a onclick="setView('racing')">Racing</a>
<a onclick="setView('multi')">Multiplayer</a>
<a onclick="setView('horror')">Horror</a>
<a onclick="setView('puzzle')">Puzzle</a>
<a onclick="setView('sports')">Sports</a>
<a onclick="setView('built')">Built-in</a>
<a onclick="showFav()">⭐ Favorites</a>
<a onclick="showRecent()">🕒 Recent</a>
</div>

<div class="main">

<h2>DarkGames X</h2>

<div class="topbar">
<input class="search" placeholder="Search games..." onkeyup="search(this.value)">
<button onclick="shuffle()">Shuffle</button>
</div>

<div class="games" id="games"></div>

</div>

<div id="loader">Loading...</div>

<div id="player">
<iframe id="frame"></iframe>
<div class="controls">
<button onclick="closeGame()">Close</button>
<button onclick="fullscreen()">Fullscreen</button>
<button onclick="fav()">⭐</button>
</div>
</div>

<script>
let games=[
{name:"Slope",cat:"popular",url:"https://ubg100.github.io/slope/"},
{name:"Run 3",cat:"popular",url:"https://ubg100.github.io/run3/"},
{name:"Drift Boss",cat:"racing",url:"https://ubg100.github.io/drift-boss/"},
{name:"1v1.lol",cat:"shooting",url:"https://ubg100.github.io/1v1-lol/"},
{name:"Tunnel Rush",cat:"action",url:"https://ubg100.github.io/tunnelrush/"},
{name:"Basketball Stars",cat:"sports",url:"https://ubg100.github.io/basketball-stars/"},
{name:"Moto X3M",cat:"racing",url:"https://ubg100.github.io/motox3m/"},
{name:"Snake",cat:"built",url:"snake.html"}
];

let view="all";
let current="";
const grid=document.getElementById("games");

/* RENDER */
function render(list){
grid.innerHTML="";
list.forEach(g=>{
let div=document.createElement("div");
div.className="card";
div.style.backgroundImage="url('https://via.placeholder.com/200x120')";
div.innerHTML=`<div class="tag">${g.cat}</div><span>${g.name}</span>`;
div.onclick=()=>openGame(g.url);
grid.appendChild(div);
});
}

render(games);

/* VIEW */
function setView(cat){
view=cat;
apply();
}

function apply(){
if(view==="all"){render(games);return;}
render(games.filter(g=>g.cat===view));
}

/* SEARCH */
function search(q){
q=q.toLowerCase();
render(games.filter(g=>g.name.toLowerCase().includes(q)));
}

/* SHUFFLE */
function shuffle(){
render(games.sort(()=>Math.random()-0.5));
}

/* PLAYER */
function openGame(url){
document.getElementById("loader").style.display="flex";
setTimeout(()=>{
document.getElementById("loader").style.display="none";
document.getElementById("player").style.display="block";
document.getElementById("frame").src=url;
},500);

current=url;

let r=JSON.parse(localStorage.getItem("recent")||"[]");
r.unshift(url);
localStorage.setItem("recent",JSON.stringify(r.slice(0,15)));
}

function closeGame(){
document.getElementById("player").style.display="none";
document.getElementById("frame").src="";
}

function fullscreen(){
document.getElementById("frame").requestFullscreen();
}

/* FAVORITES */
function fav(){
let f=JSON.parse(localStorage.getItem("fav")||"[]");
if(!f.includes(current)){
f.push(current);
localStorage.setItem("fav",JSON.stringify(f));
}
}

function showFav(){
let f=JSON.parse(localStorage.getItem("fav")||"[]");
render(games.filter(g=>f.includes(g.url)));
}

/* RECENT */
function showRecent(){
let r=JSON.parse(localStorage.getItem("recent")||"[]");
render(games.filter(g=>r.includes(g.url)));
}
</script>

</body>
</html>
