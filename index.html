<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkGames X</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{
background: radial-gradient(circle at 20% 20%, #1a0000, #000);
color:white;
overflow-x:hidden;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#050505;
border-right:2px solid red;
padding-top:20px;
}
.sidebar h1{
text-align:center;
color:red;
margin-bottom:20px;
}
.sidebar a{
display:block;
padding:12px;
color:#ff2a2a;
text-decoration:none;
transition:.2s;
text-shadow:0 0 8px red;
}
.sidebar a:hover{
background:red;
color:black;
}

/* MAIN */
.main{
margin-left:220px;
padding:20px;
}

/* SEARCH */
.search{
width:100%;
padding:12px;
border:none;
outline:none;
background:#111;
color:white;
margin-bottom:20px;
border:1px solid red;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

/* GAME CARD */
.card{
background:#111;
border:1px solid #222;
border-radius:10px;
overflow:hidden;
transition:.2s;
cursor:pointer;
}
.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px red;
}
.card img{
width:100%;
height:140px;
object-fit:cover;
}
.card h3{
padding:10px;
}

/* IFRAME PLAYER */
.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:999;
}
.player iframe{
width:100%;
height:100%;
border:none;
}
.close{
position:absolute;
top:10px;
right:20px;
font-size:25px;
cursor:pointer;
color:white;
}

/* LOADING */
.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}
</style>
</head>

<body>

<div class="loader" id="loader">Loading...</div>

<div class="sidebar">
<h1>DarkGames</h1>
<a href="#">Home</a>
<a href="#">Popular</a>
<a href="#">New</a>
<a href="#">Horror</a>
<a href="#">Action</a>
<a href="#">Racing</a>
<a href="#">Multiplayer</a>
<a href="#">Built-in Games</a>
<a href="#">Retro</a>
<a href="#">Puzzle</a>
<a href="#">Shooter</a>
<a href="#">Favorites</a>
<a href="#">Settings</a>
</div>

<div class="main">
<input class="search" placeholder="Search games..." onkeyup="searchGames(this.value)">

<div class="grid" id="games"></div>
</div>

<div class="player" id="player">
<div class="close" onclick="closeGame()">✖</div>
<iframe id="frame"></iframe>
</div>

<script>
const gameList = [
{title:"Slope",img:"https://i.imgur.com/1.jpg",url:"https://ubg100.github.io/games/slope/"},
{title:"Retro Bowl",img:"https://i.imgur.com/2.jpg",url:"https://ubg100.github.io/games/retro-bowl/"},
{title:"Run 3",img:"https://i.imgur.com/3.jpg",url:"https://ubg100.github.io/games/run3/"},
{title:"Tunnel Rush",img:"https://i.imgur.com/4.jpg",url:"https://ubg100.github.io/games/tunnel-rush/"},
{title:"Drift Boss",img:"https://i.imgur.com/5.jpg",url:"https://ubg100.github.io/games/drift-boss/"},
{title:"1v1.lol",img:"https://i.imgur.com/6.jpg",url:"https://ubg100.github.io/games/1v1lol/"},
{title:"Subway Surfers",img:"https://i.imgur.com/7.jpg",url:"https://ubg100.github.io/games/subway-surfers/"},
{title:"Moto X3M",img:"https://i.imgur.com/8.jpg",url:"https://ubg100.github.io/games/moto-x3m/"},
{title:"Basket Random",img:"https://i.imgur.com/9.jpg",url:"https://ubg100.github.io/games/basket-random/"},
{title:"Minecraft Classic",img:"https://i.imgur.com/10.jpg",url:"https://classic.minecraft.net/"},
{title:"FNAF",img:"https://i.imgur.com/11.jpg",url:"https://ubg100.github.io/games/fnaf/"},
{title:"Paper.io 2",img:"https://i.imgur.com/12.jpg",url:"https://ubg100.github.io/games/paperio2/"}
];

function loadGames(list){
const grid=document.getElementById("games");
grid.innerHTML="";
list.forEach(g=>{
grid.innerHTML+=`
<div class="card" onclick="playGame('${g.url}')">
<img src="${g.img}">
<h3>${g.title}</h3>
</div>`;
});
}

function playGame(url){
document.getElementById("frame").src=url;
document.getElementById("player").style.display="block";
}

function closeGame(){
document.getElementById("player").style.display="none";
document.getElementById("frame").src="";
}

function searchGames(q){
q=q.toLowerCase();
const filtered=gameList.filter(g=>g.title.toLowerCase().includes(q));
loadGames(filtered);
}

window.onload=()=>{
loadGames(gameList);
setTimeout(()=>document.getElementById("loader").style.display="none",800);
};
</script>

</body>
</html>
