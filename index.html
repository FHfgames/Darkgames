<!DOCTYPE html>
<html>
<head>
<title>DarkPlay V3</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#1a0000;
color:white;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:200px;
background:#0d0000;
padding:15px;
transition:0.3s;
}

.sidebar h2{
font-size:16px;
margin-bottom:10px;
color:red;
}

.tab{
display:block;
padding:8px;
margin:5px 0;
cursor:pointer;
font-size:13px;
font-weight:bold;
}

.tab:hover{
color:red;
}

/* MAIN */
.main{
flex:1;
}

/* HEADER */
header{
background:#0d0000;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

input{
padding:6px;
width:200px;
border:none;
border-radius:6px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:15px;
}

/* CARD */
.card{
background:#111;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 10px red;
}

.card img{
width:100%;
height:110px;
object-fit:cover;
}

.title{
font-size:12px;
padding:6px;
}

/* GAME */
iframe{
width:100%;
height:500px;
border:none;
background:black;
}

/* BUTTON */
button{
padding:6px;
background:red;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
margin-left:5px;
}
</style>

<script>

let games = [
{title:"Drive Mad",cat:"Driving",url:"https://www.crazygames.com/embed/drive-mad",img:"https://img.crazygames.com/games/drive-mad/cover-1658733609969.png"},
{title:"Slope",cat:"Arcade",url:"https://www.crazygames.com/embed/slope",img:"https://img.crazygames.com/games/slope/cover-1643036865327.png"},
{title:"Run 3",cat:"Arcade",url:"https://www.crazygames.com/embed/run-3",img:"https://img.crazygames.com/games/run-3/cover-1636976003331.png"},
{title:"Moto X3M",cat:"Driving",url:"https://www.crazygames.com/embed/moto-x3m",img:"https://img.crazygames.com/games/moto-x3m/cover-1637150468858.png"},
{title:"Stickman Hook",cat:"Action",url:"https://www.crazygames.com/embed/stickman-hook",img:"https://img.crazygames.com/games/stickman-hook/cover-1643022846171.png"},
{title:"Tunnel Rush",cat:"Arcade",url:"https://www.crazygames.com/embed/tunnel-rush",img:"https://img.crazygames.com/games/tunnel-rush/cover-1636992168171.png"},
{title:"Basket Random",cat:"Sports",url:"https://www.crazygames.com/embed/basket-random",img:"https://img.crazygames.com/games/basket-random/cover-1637150198375.png"},
{title:"Rooftop Snipers",cat:"Action",url:"https://www.crazygames.com/embed/rooftop-snipers",img:"https://img.crazygames.com/games/rooftop-snipers/cover-1637149966020.png"},
{title:"Drift Hunters",cat:"Driving",url:"https://www.crazygames.com/embed/drift-hunters",img:"https://img.crazygames.com/games/drift-hunters/cover-1637148944272.png"},
{title:"Smash Karts",cat:"Driving",url:"https://www.crazygames.com/embed/smash-karts",img:"https://img.crazygames.com/games/smash-karts/cover-1637148820260.png"},
{title:"1v1.LOL",cat:"Action",url:"https://www.crazygames.com/embed/1v1-lol",img:"https://img.crazygames.com/games/1v1-lol/cover-1637148682963.png"},
{title:"Space Waves",cat:"Arcade",url:"https://www.crazygames.com/embed/space-waves",img:"https://img.crazygames.com/games/space-waves/cover.png"}
];

/* DUPLICATE TO GET 60+ */
for(let i=0;i<50;i++){
games.push(games[i % 10]);
}

function render(filter="All"){
let grid=document.getElementById("grid");
grid.innerHTML="";

games.forEach(g=>{
if(filter==="All" || g.cat===filter){
grid.innerHTML+=`
<div class="card" onclick="load('${g.url}')">
<img src="${g.img}">
<div class="title">${g.title}</div>
</div>`;
}
});
}

function search(){
let val=document.getElementById("search").value.toLowerCase();
let grid=document.getElementById("grid");
grid.innerHTML="";

games.forEach(g=>{
if(g.title.toLowerCase().includes(val)){
grid.innerHTML+=`
<div class="card" onclick="load('${g.url}')">
<img src="${g.img}">
<div class="title">${g.title}</div>
</div>`;
}
});
}

function load(url){
document.getElementById("game").src=url;
}

function fullscreen(){
let iframe=document.getElementById("game");
if(iframe.requestFullscreen) iframe.requestFullscreen();
}

function toggleSidebar(){
let sb=document.getElementById("sidebar");
sb.style.display = sb.style.display==="none" ? "block" : "none";
}

</script>

</head>

<body onload="render()">

<div class="sidebar" id="sidebar">
<h2>Categories</h2>
<div class="tab" onclick="render('All')">All</div>
<div class="tab" onclick="render('Action')">Action</div>
<div class="tab" onclick="render('Driving')">Driving</div>
<div class="tab" onclick="render('Arcade')">Arcade</div>
<div class="tab" onclick="render('Sports')">Sports</div>
</div>

<div class="main">

<header>
<div>DarkPlay V3</div>
<div>
<input id="search" onkeyup="search()" placeholder="Search...">
<button onclick="toggleSidebar()">☰</button>
<button onclick="fullscreen()">Fullscreen</button>
</div>
</header>

<div id="grid" class="grid"></div>

<iframe id="game"></iframe>

</div>

</body>
</html>
