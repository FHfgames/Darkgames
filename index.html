<!DOCTYPE html>
<html>
<head>
<title>DarkPlay</title>

<style>
body {
margin:0;
background:#0a0a0a;
color:white;
font-family:sans-serif;
text-align:center;
}

header {
padding:20px;
font-size:28px;
background:#111;
color:red;
text-shadow:0 0 10px red;
}

.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
padding:20px;
}

.card {
background:#121212;
border-radius:12px;
cursor:pointer;
transition:0.3s;
overflow:hidden;
}

.card img {
width:100%;
height:120px;
object-fit:cover;
border-bottom:2px solid red;
}

.card p {
margin:10px;
font-size:14px;
font-weight:bold;
}

.card span {
font-size:12px;
color:#aaa;
display:block;
margin-bottom:10px;
}

.card:hover {
transform:scale(1.07);
box-shadow:0 0 20px red;
background:#181818;
}

iframe {
width:95%;
height:500px;
border:none;
margin-bottom:20px;
border-radius:12px;
}

button {
padding:10px;
margin:10px;
border:none;
border-radius:8px;
background:red;
color:white;
cursor:pointer;
}
</style>

<script>
function loadGame(url){
document.getElementById("game").src = url;
}

function fullscreen(){
let iframe = document.getElementById("game");
if (iframe.requestFullscreen) iframe.requestFullscreen();
}
</script>

</head>

<body>

<header>DarkPlay</header>

<div style="margin-bottom:20px;color:#bbb;">
Play high quality browser games instantly. No downloads.
</div>

<button onclick="fullscreen()">Fullscreen</button>

<div class="grid">

</div>

<p>Slope</p>
<span>Click to Play</span>
</div>

<p>Moto X3M</p>
<span>Click to Play</span>
</div>
