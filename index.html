<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DarkGames GOD MODE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:black;color:white;}
body::before{
content:"";position:fixed;width:100%;height:100%;
background-image: radial-gradient(red 1px, transparent 1px);
background-size:25px 25px;opacity:0.35;z-index:-1;
}

/* SIDEBAR */
#sidebar{width:150px;position:fixed;height:100%;background:#000;padding:10px;}
.sidebar-item{font-size:12px;margin:8px 0;cursor:pointer;color:#0ff;text-shadow:0 0 6px #0ff;}
.sidebar-item.active{color:#f0f;}

/* MAIN */
#main{margin-left:160px;padding:10px;}
#search{width:100%;padding:6px;margin-bottom:10px;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.game{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;}
.game img{width:100%;height:100px;object-fit:cover;}
.game:hover{transform:scale(1.05);box-shadow:0 0 12px red;}
.game-title{position:absolute;bottom:0;width:100%;font-size:12px;padding:5px;background:rgba(0,0,0,0.6);}
.fav{position:absolute;top:5px;right:5px;font-size:14px;color:gold;display:none;}
.game.favorited .fav{display:block;}

/* PLAYER */
#player{position:fixed;width:100%;height:100%;top:0;left:0;background:black;display:none;}
#player iframe{width:100%;height:100%;border:none;}
.controls{position:absolute;top:5px;right:10px;}
.btn{margin:3px;padding:6px;background:#111;border-radius:5px;cursor:pointer;}

/* SITES */
.site{background:#111;padding:10px;margin:6px;border-radius:6px;}

/* MUSIC */
#musicPanel{
position:fixed;bottom:10px;right:10px;background:#111;padding:10px;border-radius:8px;
}
</style>
</head>

<body>

<div id="sidebar">
<div class="sidebar-item active" onclick="tab('home',this)">🏠 Home</div>
<div class="sidebar-item" onclick="tab('action',this)">🎮 Action</div>
<div class="sidebar-item" onclick="tab('racing',this)">🚗 Racing</div>
<div class="sidebar-item" onclick="tab('shooter',this)">🔫 Shooter</div>
<div class="sidebar-item" onclick="tab('favorites',this)">⭐ Favorites</div>
<div class="sidebar-item" onclick="tab('sites',this)">🌐 Sites</div>
</div>

<div id="main">
<input id="search" placeholder="Search games..." oninput="searchGames()">

<div id="home" class="grid"></div>
<div id="action" class="grid" style="display:none"></div>
<div id="racing" class="grid" style="display:none"></div>
<div id="shooter" class="grid" style="display:none"></div>
<div id="favorites" class="grid" style="display:none"></div>

<div id="sites" style="display:none">
<h2>Game Sites</h2>
<div id="sitesList"></div>
</div>
</div>

<div id="player">
<iframe id="frame"></iframe>
<div class="controls">
<span class="btn" onclick="closeGame()">❌</span>
<span class="btn" onclick="reloadGame()">🔄</span>
<span class="btn" onclick="fullscreen()">🖥</span>
</div>
</div>

<!-- MUSIC -->
<div id="musicPanel">
<button onclick="toggleMusic()">🎵</button>
<input type="range" min="0" max="1" step="0.1" onchange="setVol(this.value)">
</div>
<audio id="music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>

/* TAB */
function tab(id,el){
document.querySelectorAll("#main > div").forEach(d=>d.style.display="none");
document.getElementById(id).style.display="grid";
document.querySelectorAll(".sidebar-item").forEach(i=>i.classList.remove("active"));
el.classList.add("active");
}

/* GAME DATA (EXPAND THIS!) */
const games=[
{name:"Slope",cat:"action",url:"https://ubg365.github.io/slope/",img:"https://images.crazygames.com/games/slope/cover-1584478910518.png"},
{name:"Run 3",cat:"action",url:"https://ubg365.github.io/run-3/",img:"https://images.crazygames.com/games/run-3/cover-1584478606153.png"},
{name:"Drift Hunters",cat:"racing",url:"https://ubg365.github.io/drift-hunters/",img:"https://images.crazygames.com/games/drift-hunters/cover-1593791675999.png"},
{name:"Shell Shockers",cat:"shooter",url:"https://shellshock.io/",img:"https://images.crazygames.com/games/shellshockers/cover-1584479424107.png"}
];

/* LOAD */
games.forEach(g=>{
addGame("home",g);
addGame(g.cat,g);
});

/* ADD GAME */
function addGame(section,g){
let d=document.createElement("div");
d.className="game";

let favs=JSON.parse(localStorage.getItem("favs")||"[]");
if(favs.includes(g.name)) d.classList.add("favorited");

d.innerHTML=`
<img src="${g.img}" onerror="this.src='https://via.placeholder.com/300x150?text=Game'">
<div class="game-title">${g.name}</div>
<div class="fav">⭐</div>
`;

d.onclick=()=>play(g.url);

/* DOUBLE CLICK FAVORITE */
d.ondblclick=(e)=>{
e.stopPropagation();
let favs=JSON.parse(localStorage.getItem("favs")||"[]");

if(favs.includes(g.name)){
favs=favs.filter(f=>f!==g.name);
d.classList.remove("favorited");
}else{
favs.push(g.name);
d.classList.add("favorited");
}

localStorage.setItem("favs",JSON.stringify(favs));
loadFavs();
};

document.getElementById(section).appendChild(d);
}

/* FAVORITES */
function loadFavs(){
let favs=JSON.parse(localStorage.getItem("favs")||"[]");
let f=document.getElementById("favorites");
f.innerHTML="";
games.forEach(g=>{
if(favs.includes(g.name)) addGame("favorites",g);
});
}
loadFavs();

/* PLAYER */
function play(url){player.style.display="block";frame.src=url;}
function closeGame(){player.style.display="none";}
function reloadGame(){frame.src=frame.src;}
function fullscreen(){player.requestFullscreen();}

/* SEARCH */
function searchGames(){
let v=search.value.toLowerCase();
document.querySelectorAll(".game").forEach(g=>{
g.style.display=g.innerText.toLowerCase().includes(v)?"block":"none";
});
}

/* MUSIC */
let playing=false;
function toggleMusic(){
let m=document.getElementById("music");
playing=!playing;
playing?m.play():m.pause();
}
function setVol(v){music.volume=v;}

/* SITES */
const sites=[
"https://poki.com/",
"https://crazygames.com/",
"https://ubg365.github.io/",
"https://coolmathgames.com/"
];

sites.forEach(s=>{
let d=document.createElement("div");
d.className="site";
d.innerHTML=`<a href="${s}" target="_blank">${s}</a>`;
document.getElementById("sitesList").appendChild(d);
});

</script>

</body>
</html>
