<!DOCTYPE html>

<html>
<head>
<title>DarkPlay NEXT</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#120000;
color:white;
}

/* LOGIN */
#loginScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

input{
padding:8px;
margin:5px;
border:none;
border-radius:6px;
}

button{
padding:8px;
background:red;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

/* APP */
#app{display:none;}

header{
background:#0a0000;
padding:10px;
display:flex;
justify-content:space-between;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:10px;
}

.card{
background:#111;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:100px;
object-fit:cover;
}

.title{
font-size:11px;
text-align:center;
padding:5px;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
flex-direction:column;
}

.modal iframe{
flex:1;
border:none;
}

.close{
background:red;
padding:10px;
text-align:center;
cursor:pointer;
}

</style>

<script>

let games=[
{title:"Drive Mad",cat:"Driving",url:"https://www.crazygames.com/embed/drive-mad",img:"https://img.crazygames.com/games/drive-mad/cover-1658733609969.png"},
{title:"Slope",cat:"Arcade",url:"https://www.crazygames.com/embed/slope",img:"https://img.crazygames.com/games/slope/cover-1643036865327.png"},
{title:"Run 3",cat:"Arcade",url:"https://www.crazygames.com/embed/run-3",img:"https://img.crazygames.com/games/run-3/cover-1636976003331.png"}
];

/* DUPLICATE */
for(let i=0;i<50;i++){games.push(games[i%3]);}

/* AUTH */
function login(){
let user=document.getElementById("user").value;
if(user){
localStorage.setItem("user",user);
start();
}
}

function start(){
document.getElementById("loginScreen").style.display="none";
document.getElementById("app").style.display="block";
render();
}

/* RENDER */
function render(list=games){
let grid=document.getElementById("grid");
grid.innerHTML="";
list.forEach(g=>{
grid.innerHTML+=`
<div class="card" onclick="play('${g.url}')">
<img src="${g.img}" onerror="this.src='https://via.placeholder.com/300x150/000/ff0000?text=DarkPlay'">
<div class="title">${g.title}</div>
</div>`;
});
}

/* PLAY */
function play(url){
document.getElementById("modal").style.display="flex";
document.getElementById("player").src=url;
}

/* CLOSE */
function closeGame(){
document.getElementById("modal").style.display="none";
document.getElementById("player").src="";
}

/* SEARCH */
function search(){
let val=document.getElementById("search").value.toLowerCase();
let filtered=games.filter(g=>g.title.toLowerCase().includes(val));
render(filtered);
}

/* AUTO LOGIN */
window.onload=()=>{
if(localStorage.getItem("user")) start();
};

</script>

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">
<h2>DarkPlay Login</h2>
<input id="user" placeholder="Enter username">
<button onclick="login()">Enter</button>
</div>

<!-- APP -->

<div id="app">

<header>
<div>DarkPlay</div>
<input id="search" onkeyup="search()" placeholder="Search games...">
</header>

<div id="grid" class="grid"></div>

</div>

<!-- MODAL -->

<div id="modal" class="modal">
<div class="close" onclick="closeGame()">Close</div>
<iframe id="player"></iframe>
</div>

</body>
</html>
