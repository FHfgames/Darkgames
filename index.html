<!DOCTYPE html>
<html>
<head>
<title>DarkPlay</title>

<style>
body {margin:0;background:#0f172a;color:white;font-family:sans-serif;text-align:center;}
header {padding:20px;font-size:30px;background:#020617;}
.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:20px;}
.card {background:#1e293b;padding:10px;border-radius:10px;cursor:pointer;}
.card:hover {background:#334155;}
iframe {width:100%;height:500px;border:none;}
button {padding:10px;margin:10px;border:none;border-radius:8px;background:#2563eb;color:white;}
</style>

<script>
function load(url){
document.getElementById("game").src = url;
}
function fullscreen(){
let iframe = document.getElementById("game");
if (iframe.requestFullscreen) iframe.requestFullscreen();
}
</script>

</head>

<body>

<header>DarkPlay</header>

<button onclick="fullscreen()">Fullscreen</button>

<div class="grid">
<div class="card" onclick="load('https://www.crazygames.com/embed/drive-mad')">Drive Mad</div>
<div class="card" onclick="load('https://www.crazygames.com/embed/slope')">Slope</div>
<div class="card" onclick="load('https://www.crazygames.com/embed/moto-x3m')">Moto X3M</div>
<div class="card" onclick="load('https://www.crazygames.com/embed/stickman-hook')">Stickman Hook</div>
<div class="card" onclick="load('https://www.crazygames.com/embed/space-waves')">Space Waves</div>
</div>

<iframe id="game"></iframe>

</body>
</html>
