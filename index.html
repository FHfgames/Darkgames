<!DOCTYPE html>
<html>
<head>
<title>DarkPlay Ultra</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(-45deg,#000,#1a0000,#330000,#000);
background-size:400% 400%;
animation:bg 10s infinite;
color:white;
display:flex;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* SIDEBAR */
.sidebar{
width:200px;
background:#0a0a0a;
padding:12px;
}

.sidebar h2{
color:#ff1a1a;
font-size:18px;
text-shadow:0 0 10px red;
}

.menu{
padding:8px;
font-size:12px;
font-weight:bold;
cursor:pointer;
border-radius:6px;
}

.menu:hover{background:#222;}
.active{background:#ff1a1a;}

/* MAIN */
.main{
flex:1;
padding:15px;
}

/* HEADER */
header{
font-size:22px;
color:#ff1a1a;
text-shadow:0 0 15px red;
margin-bottom:10px;
}

/* SEARCH */
.search{
padding:8px;
border:none;
border-radius:8px;
width:200px;
background:#111;
color:white;
font-size:12px;
margin-bottom:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:12px;
}

/* CARD */
.card{
background:#121212;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px red;
}

/* THUMBNAIL FIX */
.card img{
width:100%;
height:100px;
object-fit:cover;
background:#000;
border-bottom:2px solid red;
}

/* SMALL TEXT */
.card p{
margin:6px;
font-size:11px;
font-weight:bold;
text-shadow:0 0 6px red;
}

.card span{
font-size:10px;
color:#aaa;
margin-bottom:6px;
display:block;
}

/* PLAYER */
iframe{
width:100%;
height:450px;
border:none;
margin-top:15px;
border-radius:8px;
}

/* BUTTON */
button{
padding:6px 10px;
font-size:11px;
background:red;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
margin:5px 0;
}
</style>

<script>

const fallback = "https://via.placeholder.com/300x150/000000/FFFFFF?text=Game";

const games = [

["Drive Mad","driving","https://www.crazygames.com/embed/drive-mad","https://img.crazygames.com/games/drive-mad/cover-1650877078857.png"],
["Slope","arcade","https://www.crazygames.com/embed/slope","https://img.crazygames.com/games/slope/cover-1581699869019.png"],
["Run 3","arcade","https://www.crazygames.com/embed/run-3","https://img.crazygames.com/games/run-3/cover-1581699869340.png"],
["Moto X3M","driving","https://www.crazygames.com/embed/moto-x3m","https://img.crazygames.com/games/moto-x3m/cover-1581699869483.png"],
["Stickman Hook","action","https://www.crazygames.com/embed/stickman-hook","https://img.crazygames.com/games/stickman-hook/cover-1598526430789.png"],
["Tunnel Rush","arcade","https://img.crazygames.com/games/tunnel-rush/cover-1581699869171.png","https://www.crazygames.com/embed/tunnel-rush"],
["Basket Random","fun","https://www.crazygames.com/embed/basket-random","https://img.crazygames.com/games/basket-random/cover-1598526430633.png"],
["Rooftop Snipers","action","https://www.crazygames.com/embed/rooftop-snipers","https://img.crazygames.com/games/rooftop-snipers/cover-1581699869555.png"],
["Drift Hunters","driving","https://www.crazygames.com/embed/drift-hunters","https://img.crazygames.com/games/drift-hunters/cover.png"],
["Smash Karts","action","https://www.crazygames.com/embed/smash-karts","https://img.crazygames.com/games/smash-karts/cover.png"]

];

function loadGame(url){
document.getElementById("game").src=url;
}

function display(list){
let html="";
list.forEach(g=>{
html+=`
<div class="card" onclick="loadGame('${g[2]}')">
<img src="${g[3]}" onerror="this.onerror=null;this.src='${fallback}'">
<p>${g[0]}</p>
<span>play</span>
</div>`;
});
document.getElementById("games").innerHTML=html;
}

function filter(cat,el){
document.querySelectorAll(".menu").forEach(m=>m.classList.remove("active"));
if(el) el.classList.add("active");

display(cat==="all"?games:games.filter(g=>g[1]===cat));
}

function searchGames(text){
text=text.toLowerCase();
display(games.filter(g=>g[0].toLowerCase().includes(text)));
}

window.onload=()=>display(games);

</script>

</head>

<body>

<div class="sidebar">
<h2>darkplay</h2>

<div class="menu active" onclick="filter('all',this)">all</div>
<div class="menu" onclick="filter('action',this)">action</div>
<div class="menu" onclick="filter('arcade',this)">arcade</div>
<div class="menu" onclick="filter('driving',this)">driving</div>
<div class="menu" onclick="filter('fun',this)">fun</div>

</div>

<div class="main">

<header>play games</header>

<input class="search" placeholder="search..." onkeyup="searchGames(this.value)">

<br>
<button onclick="filter('all')">refresh</button>

<div class="grid" id="games"></div>

<iframe id="game"></iframe>

</div>

</body>
</html>
