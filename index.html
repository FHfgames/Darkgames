<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DarkGames</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #1a0000, #000);
  color: white;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  width: 220px;
  height: 100%;
  background: #0a0a0a;
  padding-top: 10px;
}

.sidebar a {
  display: block;
  padding: 12px;
  color: #ff2e2e;
  text-decoration: none;
  font-weight: bold;
}

.sidebar a:hover {
  color: white;
  text-shadow: 0 0 10px red;
}

/* MAIN */
.main {
  margin-left: 230px;
  padding: 20px;
}

/* SEARCH */
.search {
  padding: 10px;
  width: 300px;
  margin-bottom: 20px;
  border-radius: 5px;
  border: none;
}

/* GRID */
.games {
  display: grid;
  grid-template-columns: repeat(auto-fill, 200px);
  gap: 20px;
}

.game-card {
  height: 120px;
  border-radius: 10px;
  background-size: cover;
  display: flex;
  align-items: end;
  padding: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.game-card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px red;
}

/* GAME PLAYER */
#player {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
}

#player iframe {
  width: 100%;
  height: 90%;
  border: none;
}

.controls {
  text-align: center;
  padding: 10px;
}
button {
  padding: 10px;
  margin: 5px;
  background: red;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <a href="#">Home</a>
  <a href="#">Popular</a>
  <a href="#">New</a>
  <a href="#">Action</a>
  <a href="#">Shooting</a>
  <a href="#">Racing</a>
  <a href="#">Multiplayer</a>
  <a href="#">Horror</a>
  <a href="#">Puzzle</a>
  <a href="#">Sports</a>
  <a href="#">Built-in Games</a>
  <a href="#">Favorites</a>
  <a href="#">Settings</a>
</div>

<!-- MAIN -->
<div class="main">

<h2>🔥 DarkGames</h2>
<p>✔ Safe ✔ No downloads ✔ Works at school ✔ Instant play</p>

<input class="search" placeholder="Search games..." onkeyup="searchGames(this.value)">

<div class="games" id="games">

<!-- GAME CARDS -->
<div class="game-card" data-name="slope"
style="background-image:url('https://via.placeholder.com/200x120')"
onclick="loadGame('https://ubg100.github.io/slope/')">
<span>Slope</span>
</div>

<div class="game-card" data-name="run3"
style="background-image:url('https://via.placeholder.com/200x120')"
onclick="loadGame('https://ubg100.github.io/run3/')">
<span>Run 3</span>
</div>

<div class="game-card" data-name="tetris"
style="background-image:url('https://via.placeholder.com/200x120')"
onclick="loadGame('built-in/tetris.html')">
<span>Tetris (Built-in)</span>
</div>

</div>
</div>

<!-- PLAYER -->
<div id="player">
  <iframe id="gameFrame"></iframe>

  <div class="controls">
    <button onclick="closeGame()">Close</button>
    <button onclick="fullscreen()">Fullscreen</button>
    <button onclick="favoriteGame()">⭐ Favorite</button>
  </div>
</div>

<script>
let currentGame = "";

/* LOAD GAME */
function loadGame(url) {
  document.getElementById("player").style.display = "block";
  document.getElementById("gameFrame").src = url;
  currentGame = url;
}

/* CLOSE */
function closeGame() {
  document.getElementById("player").style.display = "none";
  document.getElementById("gameFrame").src = "";
}

/* FULLSCREEN */
function fullscreen() {
  document.getElementById("gameFrame").requestFullscreen();
}

/* SEARCH */
function searchGames(input) {
  let games = document.querySelectorAll(".game-card");
  input = input.toLowerCase();

  games.forEach(game => {
    let name = game.dataset.name;
    game.style.display = name.includes(input) ? "block" : "none";
  });
}

/* FAVORITES */
function favoriteGame() {
  let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
  if (!favorites.includes(currentGame)) {
    favorites.push(currentGame);
    localStorage.setItem("favorites", JSON.stringify(favorites));
    alert("Added to favorites ⭐");
  }
}
</script>

</body>
</html>
