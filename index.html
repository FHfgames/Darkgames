<!DOCTYPE html>
<html>
<head>
<title>DarkPlay</title>

<style>
body {
margin:0;
background:#0a0a0a;
color:white;
font-family:sans-serif;
display:flex;
}

/* SIDEBAR */
.sidebar {
width:220px;
background:#111;
padding:20px;
transition:0.3s;
}

.sidebar h2 {
color:red;
margin-bottom:20px;
}

.sidebar button {
display:block;
width:100%;
margin:5px 0;
padding:10px;
background:#1a1a1a;
border:none;
color:white;
cursor:pointer;
font-weight:bold;
}

.sidebar button:hover {
background:red;
}

/* MAIN */
.main {
flex:1;
padding:20px;
}

header {
font-size:28px;
color:red;
text-shadow:0 0 10px red;
margin-bottom:10px;
}

/* GRID */
.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
}

/* CARD */
.card {
background:#121212;
border-radius:12px;
cursor:pointer;
transition:0.3s;
overflow:hidden;
}

.card img {
width:100%;
height:120px;
object-fit:cover;
border-bottom:2px solid red;
}

.card p {
margin:10px;
font-size:14px;
font-weight:bold;
}

.card span {
font-size:12px;
color:#aaa;
display:block;
margin-bottom:10px;
}

.card:hover {
transform:scale(1.07);
box-shadow:0 0 20px red;
}

/* PLAYER */
iframe {
width:100%;
height:500px;
border:none;
margin-top:20px;
border-radius:10px;
}

/* BUTTONS */
.topbar {
margin-bottom:10px;
}

.topbar button {
margin-right:10px;
padding:8px 12px;
background:red;
border:none;
color:white;
cursor:pointer;
}

/* HIDE SIDEBAR */
.hidden {
width:0;
padding:0;
overflow:hidden;
}
</style>

<script>
function loadGame(url){
document.getElementById("game").src = url;
}

function filter(category){
let cards = document.querySelectorAll(".card");
cards.forEach(card=>{
if(category=="all" || card.dataset.cat==category){
card.style.display="block";
}else{
card.style.display="none";
}
});
}

function toggleSidebar(){
let side = document.getElementById("sidebar");
side.classList.toggle("hidden");
}
</script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<h2>Menu</h2>
<button onclick="filter('all')">All</button>
<button onclick="filter('action')">Action</button>
<button onclick="filter('driving')">Driving</button>
<button onclick="filter('arcade')">Arcade</button>
<button onclick="filter('fun')">Fun</button>
</div>

<!-- MAIN -->
<div class="main">

<header>DarkPlay</header>

<div class="topbar">
<button onclick="toggleSidebar()">Toggle Menu</button>
</div>

<div class="grid">

<!-- GAMES -->

<div class="card" data-cat="driving" onclick="loadGame('https://www.crazygames.com/embed/drive-mad')">
<img src="https://images.crazygames.com/drive-mad/cover-1650877078857.png" onerror="this.src='https://via.placeholder.com/300x150'">
<p>Drive Mad</p>
<span>Click to Play</span>
</div>

<div class="card" data-cat="arcade" onclick="loadGame('https://www.crazygames.com/embed/slope')">
<img src="https://images.crazygames.com/slope/cover-1581699869287.png" onerror="this.src='https://via.placeholder.com/300x150'">
<p>Slope</p>
<span>Click to Play</span>
</div>

<div class="card" data-cat="driving" onclick="loadGame('https://www.crazygames.com/embed/moto-x3m')">
<img src="https://images.crazygames.com/moto-x3m/cover-1581699869344.png" onerror="this.src='https://via.placeholder.com/300x150'">
<p>Moto X3M</p>
<span>Click to Play</span>
</div>

<div class="card" data-cat="action" onclick="loadGame('https://www.crazygames.com/embed/stickman-hook')">
<img src="https://images.crazygames.com/stickman-hook/cover-1581699869492.png" onerror="this.src='https://via.placeholder.com/300x150'">
<p>Stickman Hook</p>
<span>Click to Play</span>
</div>

<div class="card" data-cat="arcade" onclick="loadGame('https://www.crazygames.com/embed/run-3')">
<img src="https://images.crazygames.com/run-3/cover-1581699869340.png" onerror="this.src='https://via.placeholder.com/300x150'">
<p>Run 3</p>
<span>Click to Play</span>
</div>

<div class="card" data-cat="arcade" onclick="loadGame('https://www.crazygames.com/embed/tunnel-rush')">
<img src="https://images.crazygames.com/tunnel-rush/cover-1581699869171.png" onerror="this.src='https://via.placeholder.com/300x150'">
<p>Tunnel Rush</p>
<span>Click to Play</span>
</div>

<div class="card" data-cat="fun" onclick="loadGame('https://www.crazygames.com/embed/basket-random')">
<img src="https://images.crazygames.com/basket-random/cover-1598526430633.png" onerror="this.src='https://via.placeholder.com/300x150'">
<p>Basket Random</p>
<span>Click to Play</span>
</div>

<div class="card" data-cat="action" onclick="loadGame('https://www.crazygames.com/embed/rooftop-snipers')">
<img src="https://images.crazygames.com/rooftop-snipers/cover-1581699869555.png" onerror="this.src='https://via.placeholder.com/300x150'">
<p>Rooftop Snipers</p>
<span>Click to Play</span>
</div>

</div>

<iframe id="game"></iframe>

</div>

</body>
</html>
