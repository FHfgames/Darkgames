<!DOCTYPE html>
<html>
<head>
<title>DarkPlay</title>

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:white}

/* TOP */
.topbar{
display:flex;justify-content:space-between;
padding:10px 20px;background:#111
}
.search{
padding:10px;border-radius:20px;border:none;
width:250px;background:#222;color:white
}

/* LAYOUT */
.container{display:flex}

/* SIDEBAR */
.sidebar{
width:210px;background:#111;height:100vh;
padding:15px
}

.section-title{
font-size:12px;
opacity:0.5;
margin:15px 0 5px;
font-weight:bold;
}

/* TABS */
.menu{
padding:10px;
border-radius:10px;
margin-bottom:6px;
cursor:pointer;
font-weight:bold; /* BOLD */
transition:0.2s;
}

.menu:hover{background:#222}
.active{background:#ff3c3c}

/* MAIN */
.main{flex:1;padding:20px}

/* HERO */
.hero{
background:#1a1a1a;
padding:30px;
border-radius:15px;
margin-bottom:20px
}
.hero h1{font-size:36px;margin:0}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px
}

.card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.2s
}
.card:hover{transform:scale(1.05)}

.card img{
width:100%;
height:100px;
object-fit:cover
}

.card p{
text-align:center;
font-size:12px;
padding:5px
}

/* PLAYER */
iframe{
width:100%;
height:450px;
border:none;
border-radius:10px;
margin-bottom:15px
}

/* BUTTONS */
.btn{
padding:8px 12px;
border:none;
border-radius:8px;
background:#ff3c3c;
color:white;
cursor:pointer;
margin:5px;
}
</style>

</head>

<body>

<div class="topbar">
<input class="search" placeholder="Search..." onkeyup="searchGames(this.value)">
</div>

<div class="container">

<div class="sidebar">

<div class="section-title">MENU</div>
<div class="menu active" onclick="show('all',this)">Home</div>
<div class="menu" onclick="show('popular',this)">Popular</div>
<div class="menu" onclick="show('new',this)">New</div>

<div class="section-title">CATEGORIES</div>
<div class="menu" onclick="show('action',this)">Action</div>
<div class="menu" onclick="show('arcade',this)">Arcade</div>
<div class="menu" onclick="show('racing',this)">Driving</div>
<div class="menu" onclick="show('multiplayer',this)">Multiplayer</div>

<div class="section-title">WEBSITES</div>
<div class="menu" onclick="openSite('https://poki.com')">Poki</div>
<div class="menu" onclick="openSite('https://crazygames.com')">CrazyGames</div>
<div class="menu" onclick="openSite('https://coolmathgames.com')">CoolMath</div>

</div>

<div class="main">

<div class="hero">
<h1>Play 1000+ Games</h1>
<p>Clean. Fast. Unblocked.</p>
</div>

<div>
<button class="btn" onclick="fullscreen()">Fullscreen</button>
<button class="btn" onclick="clearGame()">Close</button>
</div>

<iframe id="game"></iframe>

<div class="grid" id="games"></div>

</div>
</div>

<script>

const games = [

/* POPULAR */
["Drive Mad","popular","https://www.crazygames.com/embed/drive-mad","https://images.crazygames.com/games/drive-mad/cover.png"],
["Slope","popular","https://www.crazygames.com/embed/slope","https://images.crazygames.com/games/slope/cover.png"],
["Run 3","popular","https://www.crazygames.com/embed/run-3","https://images.crazygames.com/games/run-3/cover.png"],

/* ACTION */
["Stickman Hook","action","https://www.crazygames.com/embed/stickman-hook","https://images.crazygames.com/games/stickman-hook/cover.png"],
["OvO","action","https://www.crazygames.com/embed/ovo","https://images.crazygames.com/games/ovo/cover.png"],
["1v1.LOL","multiplayer","https://www.crazygames.com/embed/1v1-lol","https://images.crazygames.com/games/1v1-lol/cover.png"],

/* ARCADE */
["Tunnel Rush","arcade","https://www.crazygames.com/embed/tunnel-rush","https://images.crazygames.com/games/tunnel-rush/cover.png"],
["Crossy Road","arcade","https://www.crazygames.com/embed/crossy-road","https://images.crazygames.com/games/crossy-road/cover.png"],
["Helix Jump","arcade","https://www.crazygames.com/embed/helix-jump","https://images.crazygames.com/games/helix-jump/cover.png"],

/* RACING */
["Moto X3M","racing","https://www.crazygames.com/embed/moto-x3m","https://images.crazygames.com/games/moto-x3m/cover.png"],
["Drift Hunters","racing","https://www.crazygames.com/embed/drift-hunters","https://images.crazygames.com/games/drift-hunters/cover.png"],
["Madalin Cars","racing","https://www.crazygames.com/embed/madalin-stunt-cars-2","https://images.crazygames.com/games/madalin-stunt-cars-2/cover.png"]

];

function load(url){
document.getElementById("game").src=url;
}

function openSite(url){
window.open(url,"_blank");
}

function fullscreen(){
let iframe=document.getElementById("game");
if(iframe.requestFullscreen) iframe.requestFullscreen();
}

function clearGame(){
document.getElementById("game").src="";
}

function display(list){
let html="";
list.forEach(g=>{
html+=`<div class="card" onclick="load('${g[2]}')">
<img src="${g[3]}">
<p>${g[0]}</p>
</div>`;
});
document.getElementById("games").innerHTML=html;
}

function show(type,el){
document.querySelectorAll(".menu").forEach(m=>m.classList.remove("active"));
if(el) el.classList.add("active");

if(type==="all"){display(games);}
else{display(games.filter(g=>g[1]===type));}

window.scrollTo({top:300,behavior:"smooth"});
}

function searchGames(text){
text=text.toLowerCase();
display(games.filter(g=>g[0].toLowerCase().includes(text)));
}

display(games);

</script>

</body>
</html>
