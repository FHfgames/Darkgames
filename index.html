<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DarkGames</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  overflow-x: hidden;
}

/* RED DOT BACKGROUND */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  width: 140px;
  height: 100%;
  background: #111;
  padding: 10px;
  overflow-y: auto;
  transition: 0.3s;
}

.sidebar a {
  display: block;
  color: red;
  font-size: 11px;
  margin: 6px 0;
  text-decoration: none;
  text-shadow: 0 0 6px red;
}

.sidebar a:hover {
  color: white;
}

/* MAIN */
.main {
  margin-left: 150px;
  padding: 10px;
}

/* GAME GRID */
.games {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}

.game {
  height: 100px;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: end;
  color: white;
  font-size: 12px;
  padding: 5px;
  cursor: pointer;
  border-radius: 6px;
  transition: 0.2s;
}

.game:hover {
  transform: scale(1.05);
}

/* BUTTONS */
.buttons {
  position: fixed;
  top: 10px;
  right: 10px;
}

.btn {
  background: black;
  color: white;
  border: 1px solid red;
  padding: 6px;
  margin: 4px;
  cursor: pointer;
}

/* GAME FRAME */
iframe {
  width: 100%;
  height: 500px;
  border: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="sidebar" id="sidebar">
  <a href="#">Home</a>
  <a href="#">Action</a>
  <a href="#">Adventure</a>
  <a href="#">Racing</a>
  <a href="#">Shooting</a>
  <a href="#">Puzzle</a>
  <a href="#">Multiplayer</a>
  <a href="#">Horror</a>
  <a href="#">Sports</a>
  <a href="#">Built-in Games</a>
  <a href="#">Other Websites</a>
  <a href="#">Favorites</a>
  <a href="#">Settings</a>
</div>

<div class="main">
  <h2 style="color:red;">DarkGames</h2>

  <div class="games" id="games"></div>

  <iframe id="gameFrame"></iframe>
</div>

<div class="buttons">
  <button class="btn" onclick="toggleSidebar()">📂</button>
  <button class="btn" onclick="goFullscreen()">🖥️</button>
  <button class="btn" onclick="randomGame()">🎲</button>
  <button class="btn" onclick="scrollTopPage()">⬆️</button>
</div>

<script>
const gameList = [
  {name:"Slope", url:"https://ubg365.github.io/slope/", img:"https://i.imgur.com/9YjvZ6R.jpeg"},
  {name:"Run 3", url:"https://ubg365.github.io/run3/", img:"https://i.imgur.com/W1bXnZL.jpeg"},
  {name:"1v1.LOL", url:"https://ubg365.github.io/1v1lol/", img:"https://i.imgur.com/6vT6VvM.jpeg"},
  {name:"Basketball Stars", url:"https://ubg365.github.io/basketball-stars/", img:"https://i.imgur.com/5rF3W2Z.jpeg"},
  {name:"Drift Hunters", url:"https://ubg365.github.io/drift-hunters/", img:"https://i.imgur.com/Fy0XK0b.jpeg"}
];

// AUTO GENERATE 200+ GAMES
for (let i = 0; i < 200; i++) {
  gameList.push({
    name: "Game " + (i+1),
    url: "https://ubg365.github.io/run3/",
    img: "https://picsum.photos/200/100?random=" + i
  });
}

const container = document.getElementById("games");

gameList.forEach(game => {
  const div = document.createElement("div");
  div.className = "game";
  div.style.backgroundImage = `url(${game.img})`;
  div.innerText = game.name;
  div.onclick = () => {
    document.getElementById("gameFrame").src = game.url;
  };
  container.appendChild(div);
});

/* BUTTON FUNCTIONS */
function toggleSidebar() {
  let s = document.getElementById("sidebar");
  s.style.display = s.style.display === "none" ? "block" : "none";
}

function goFullscreen() {
  document.documentElement.requestFullscreen();
}

function randomGame() {
  let g = gameList[Math.floor(Math.random()*gameList.length)];
  document.getElementById("gameFrame").src = g.url;
}

function scrollTopPage() {
  window.scrollTo({top:0, behavior:'smooth'});
}

/* RED DOT BACKGROUND */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let dots = [];

for(let i=0;i<120;i++){
  dots.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: 2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "rgba(255,0,0,0.35)";
  dots.forEach(d=>{
    ctx.beginPath();
    ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
