<!DOCTYPE html>
<html>
<head>
<title>DarkPlay</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(-45deg,#000,#1a0000,#330000,#000);
background-size:400% 400%;
animation:bg 10s infinite;
color:white;
display:flex;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#0a0a0a;
padding:15px;
transition:0.3s;
}

.sidebar h2{
color:#ff1a1a;
text-shadow:0 0 10px red;
}

.menu{
padding:10px;
margin:5px 0;
cursor:pointer;
border-radius:8px;
font-weight:bold;
}

.menu:hover{background:#222;}
.active{background:#ff1a1a;}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* HEADER */
header{
font-size:30px;
color:#ff1a1a;
text-shadow:0 0 20px red;
margin-bottom:10px;
}

/* SEARCH */
.search{
padding:10px;
border:none;
border-radius:10px;
width:250px;
background:#111;
color:white;
margin-bottom:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:15px;
}

/* CARD */
.card{
background:#121212;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
position:relative;
}

.card:hover{
transform:scale(1.06);
box-shadow:0 0 25px red;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-bottom:2px solid red;
}

/* fallback fix */
.card img{
background:#000;
}

.card p{
margin:10px;
font-size:14px;
font-weight:bold;
text-shadow:0 0 10px red;
}

.card span{
font-size:12px;
color:#aaa;
margin-bottom:10px;
display:block;
}

/* PLAYER */
iframe{
width:100%;
height:500px;
border:none;
margin-top:20px;
border-radius:10px;
}

/* BUTTONS */
button{
padding:8px 12px;
margin:5px;
background:red;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.hidden{
width:0;
padding:0;
overflow:hidden;
}
</style>

<script>

const games = [

["Drive Mad","driving","https://www.crazygames.com/embed/drive-mad","https://images.crazygames.com/drive-mad/cover-1650877078857.png"],
["Slope","arcade","https://www.crazygames.com/embed/slope","https://images.crazygames.com/slope/cover-1581699869287.png"],
["Run 3","arcade","https://www.crazygames.com/embed/run-3","https://images.crazygames.com/run-3/cover-1581699869340.png"],
["Moto X3M","driving","https://www.crazygames.com/embed/moto-x3m","https://images.crazygames.com/moto-x3m/cover-1581699869344.png"],
["Stickman Hook","action","https://www.crazygames.com/embed/stickman-hook","https://images.crazygames.com/stickman-hook/cover-1581699869492.png"],
["Tunnel Rush","arcade","https://www.crazygames.com/embed/tunnel-rush","https://images.crazygames.com/tunnel-rush/cover-1581699869171.png"],
["Basket Random","fun","https://www.crazygames.com/embed/basket-random","https://images.crazygames.com/basket-random/cover-1598526430633.png"],
["Rooftop Snipers","action","https://www.crazygames.com/embed/rooftop-snipers","https://images.crazygames.com/rooftop-snipers/cover-1581699869555.png"],
["Crossy Road","arcade","https://www.crazygames.com/embed/crossy-road","https://images.crazygames.com/crossy-road/cover.png"],
["Paper.io 2","arcade","https://www.crazygames.com/embed/paper-io-2","https://images.crazygames.com/paper-io-2/cover.png"],
["Smash Karts","action","https://www.crazygames.com/embed/smash-karts","https://images.crazygames.com/smash-karts/cover.png"],
["Drift Hunters","driving","https://www.crazygames.com/embed/drift-hunters","https://images.crazygames.com/drift-hunters/cover.png"]

];

function loadGame(url){
document.getElementById("game").src=url;
}

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("hidden");
}

function filter(cat,el){
document.querySelectorAll(".menu").forEach(m=>m.classList.remove("active"));
if(el) el.classList.add("active");

display(cat==="all"?games:games.filter(g=>g[1]===cat));
}

function display(list){
let html="";
list.forEach(g=>{
html+=`
<div class="card" onclick="loadGame('${g[2]}')">
<img src="${g[3]}" onerror="this.src='https://via.placeholder.com/300x150?text=Game'">
<p>${g[0]}</p>
<span>Click to Play</span>
</div>`;
});
document.getElementById("games").innerHTML=html;
}

function searchGames(text){
text=text.toLowerCase();
display(games.filter(g=>g[0].toLowerCase().includes(text)));
}

window.onload=()=>display(games);

</script>

</head>

<body>

<div class="sidebar" id="sidebar">
<h2>DarkPlay</h2>

<div class="menu active" onclick="filter('all',this)">All</div>
<div class="menu" onclick="filter('action',this)">Action</div>
<div class="menu" onclick="filter('arcade',this)">Arcade</div>
<div class="menu" onclick="filter('driving',this)">Driving</div>
<div class="menu" onclick="filter('fun',this)">Fun</div>

</div>

<div class="main">

<header>Play Games</header>

<input class="search" placeholder="Search..." onkeyup="searchGames(this.value)">

<br>
<button onclick="toggleSidebar()">Toggle Menu</button>

<div class="grid" id="games"></div>

<iframe id="game"></iframe>

</div>

</body>
</html>
