<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DarkGames Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* RED DOT BACKGROUND */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(red 1px, transparent 1px);
  background-size: 25px 25px;
  opacity: 0.35;
  z-index: -1;
}

/* SIDEBAR */
#sidebar {
  position: fixed;
  width: 140px;
  height: 100%;
  background: #000;
  padding: 10px;
  overflow-y: auto;
  transition: 0.3s;
}

.sidebar-item {
  font-size: 12px;
  margin: 8px 0;
  cursor: pointer;
  color: #0ff;
  text-shadow: 0 0 5px #0ff;
}

.sidebar-item:hover {
  color: #f0f;
  text-shadow: 0 0 10px #f0f;
}

/* MAIN */
#main {
  margin-left: 150px;
  padding: 10px;
}

/* GAME GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}

.game {
  background: #111;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
}

.game:hover {
  transform: scale(1.05);
}

.game img {
  width: 100%;
  height: 90px;
  object-fit: cover;
}

.game-title {
  font-size: 12px;
  padding: 5px;
}

/* PLAYER */
#player {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
}

#player iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* BUTTONS */
#topbar {
  position: fixed;
  top: 5px;
  right: 10px;
}

.btn {
  margin: 3px;
  padding: 5px;
  cursor: pointer;
  font-size: 16px;
  background: #111;
  border-radius: 5px;
}
</style>
</head>

<body>

<div id="sidebar">
  <div class="sidebar-item" onclick="showSection('home')">Home</div>
  <div class="sidebar-item" onclick="showSection('action')">Action</div>
  <div class="sidebar-item" onclick="showSection('racing')">Racing</div>
  <div class="sidebar-item" onclick="showSection('shooter')">Shooter</div>
  <div class="sidebar-item" onclick="showSection('arcade')">Arcade</div>
  <div class="sidebar-item" onclick="showSection('funny')">Funny</div>
  <div class="sidebar-item" onclick="showSection('retro')">Retro</div>
  <div class="sidebar-item" onclick="showSection('puzzle')">Puzzle</div>
  <div class="sidebar-item" onclick="showSection('sports')">Sports</div>
  <div class="sidebar-item" onclick="showSection('idle')">Idle</div>
  <div class="sidebar-item" onclick="showSection('built')">Built in games</div>
  <div class="sidebar-item" onclick="showSection('sites')">Other websites</div>
  <div class="sidebar-item" onclick="showSection('settings')">Settings</div>
</div>

<div id="topbar">
  <span class="btn" onclick="toggleSidebar()">📂</span>
  <span class="btn" onclick="document.body.requestFullscreen()">🖥️</span>
  <span class="btn" onclick="location.reload()">🔄</span>
  <span class="btn" onclick="alert('DarkGames Pro Loaded')">⭐</span>
</div>

<div id="main">

  <div id="home" class="grid"></div>
  <div id="action" class="grid" style="display:none;"></div>
  <div id="racing" class="grid" style="display:none;"></div>
  <div id="shooter" class="grid" style="display:none;"></div>
  <div id="arcade" class="grid" style="display:none;"></div>

  <div id="built" style="display:none;">
    <h2>Built-in Game</h2>
    <button onclick="startBuilt()">Play Clicker</button>
    <div id="builtGame"></div>
  </div>

  <div id="sites" style="display:none;">
    <h2>Other Websites</h2>
    <div id="sitesList"></div>
  </div>

</div>

<div id="player">
  <iframe id="frame"></iframe>
</div>

<script>
function toggleSidebar() {
  let s = document.getElementById("sidebar");
  s.style.display = (s.style.display === "none") ? "block" : "none";
}

function showSection(id) {
  document.querySelectorAll("#main > div").forEach(d => d.style.display = "none");
  document.getElementById(id).style.display = "grid";
}

/* LOAD GAMES */
const games = [
  {name:"Slope", url:"https://ubg365.github.io/slope/", img:"https://i.imgur.com/8Qf4K2P.jpeg"},
  {name:"Run 3", url:"https://ubg365.github.io/run-3/", img:"https://i.imgur.com/3cXQY6K.jpeg"},
  {name:"Drift Hunters", url:"https://ubg365.github.io/drift-hunters/", img:"https://i.imgur.com/X9a6F8M.jpeg"},
  {name:"1v1.lol", url:"https://1v1.lol/", img:"https://i.imgur.com/YpZq9Xt.jpeg"},
  {name:"Shell Shockers", url:"https://shellshock.io/", img:"https://i.imgur.com/znT9zvL.jpeg"}
];

/* CLONE TO 100+ */
for(let i=0;i<25;i++){
  games.forEach(g=>{
    addGame("home", g);
  });
}

function addGame(section, game){
  let div = document.createElement("div");
  div.className="game";
  div.innerHTML = `
    <img src="${game.img}">
    <div class="game-title">${game.name}</div>
  `;
  div.onclick=()=>play(game.url);
  document.getElementById(section).appendChild(div);
}

function play(url){
  document.getElementById("player").style.display="block";
  document.getElementById("frame").src=url;
}

document.getElementById("player").onclick = ()=>{
  document.getElementById("player").style.display="none";
};

/* BUILT-IN GAME */
function startBuilt(){
  let score=0;
  let div=document.getElementById("builtGame");
  div.innerHTML="";
  let btn=document.createElement("button");
  btn.innerText="Click me!";
  btn.onclick=()=>{
    score++;
    btn.innerText="Score: "+score;
  };
  div.appendChild(btn);
}

/* OTHER SITES (add more easily) */
const sites = [
  "https://ubg365.github.io/",
  "https://sites.google.com/view/unblockedgames76/",
  "https://coolmathgames.com",
  "https://poki.com"
];

sites.forEach(s=>{
  let a=document.createElement("div");
  a.innerHTML=`<a href="${s}" target="_blank">${s}</a>`;
  document.getElementById("sitesList").appendChild(a);
});
</script>

</body>
</html>
