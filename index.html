<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>samlikespizza3289!🍕</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background: radial-gradient(circle at center, #2b0000, #000);color:white}
.sidebar{position:fixed;left:0;top:0;width:250px;height:100%;background:#140000;border-right:3px solid orange;padding-top:20px;overflow-y:auto}
.sidebar h1{text-align:center;color:orange;margin-bottom:20px;text-shadow:0 0 25px orange;font-size:26px}
.sidebar a{display:block;padding:13px;color:#ffb347;text-decoration:none;font-weight:bold;text-shadow:0 0 10px orange;cursor:pointer;font-size:15px}
.sidebar a:hover{background:orange;color:black}
.main{margin-left:250px;padding:20px}
.banner{width:100%;height:140px;background:linear-gradient(90deg,orange,red);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:bold;margin-bottom:20px}
.search{width:100%;padding:16px;background:#220000;color:white;border:1px solid orange;margin-bottom:20px;font-size:17px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px}
.card{background:#1a0000;border-radius:14px;overflow:hidden;cursor:pointer;transition:.3s;position:relative;border:1px solid #ff7b00}
.card:hover{transform:scale(1.06);box-shadow:0 0 30px orange}
.card img{width:100%;height:120px;object-fit:cover}
.card h3{padding:8px;font-size:14px}
.tag{position:absolute;top:6px;left:6px;background:orange;color:black;font-size:11px;padding:4px 7px;border-radius:6px}
.player{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:none;z-index:999}
.player iframe{width:100%;height:100%;border:none}
.close{position:absolute;top:10px;right:20px;font-size:30px;cursor:pointer;color:white}
.footer{margin-top:40px;padding:25px;text-align:center;border-top:1px solid orange;opacity:.7;font-size:14px}
</style>
</head>

<body>

<div class="sidebar">
<h1>🍕 PizzaGames</h1>
<a onclick="filterGames('all')">🍕 Home</a>
<a onclick="filterGames('popular')">🔥 Hot Slices</a>
<a onclick="filterGames('new')">🆕 Fresh Out</a>
<a onclick="filterGames('horror')">👻 Spicy Horror</a>
<a onclick="filterGames('action')">⚔️ Action Feast</a>
<a onclick="filterGames('racing')">🏎️ Fast Delivery</a>
<a onclick="filterGames('multiplayer')">🌐 Multiplayer Party</a>
<a onclick="filterGames('builtin')">🎮 Built-in Oven</a>
<a onclick="filterGames('retro')">🕹️ Retro Recipes</a>
<a onclick="filterGames('puzzle')">🧩 Puzzle Toppings</a>
<a onclick="filterGames('shooter')">🔫 Shooter Sauce</a>
<a onclick="filterGames('favorites')">⭐ Favorites</a>
<a onclick="filterGames('all')">⚙️ Settings</a>
</div>

<div class="main">
<div class="banner">🍕 PIZZAGAMES ULTRA 🍕</div>
<input class="search" placeholder="Search games..." onkeyup="searchGames(this.value)">
<div class="grid" id="games"></div>
<div class="footer"><p>🍕 Verified Working Games Only 🍕</p></div>
</div>

<div class="player" id="player">
<div class="close" onclick="closeGame()">✖</div>
<iframe id="frame"></iframe>
</div>

<script>
const fallback="https://picsum.photos/400/250?random=";

/* VERIFIED WORKING GAMES ONLY (NO FAKE LINKS) */
const gameList=[
{title:"🍕 Slope",categories:["popular","arcade"],url:"https://ubg100.github.io/games/slope/"},
{title:"🍕 Run 3",categories:["popular","arcade"],url:"https://ubg100.github.io/games/run3/"},
{title:"🍕 Tunnel Rush",categories:["arcade"],url:"https://ubg100.github.io/games/tunnel-rush/"},
{title:"🍕 Drift Boss",categories:["racing"],url:"https://ubg100.github.io/games/drift-boss/"},
{title:"🍕 Moto X3M",categories:["racing"],url:"https://ubg100.github.io/games/moto-x3m/"},
{title:"🍕 1v1.lol",categories:["shooter","multiplayer"],url:"https://ubg100.github.io/games/1v1lol/"},
{title:"🍕 Shell Shockers",categories:["shooter","multiplayer"],url:"https://shellshock.io/"},
{title:"🍕 Krunker",categories:["shooter","multiplayer"],url:"https://krunker.io/"},
{title:"🍕 Basket Random",categories:["action"],url:"https://ubg100.github.io/games/basket-random/"},
{title:"🍕 Paper.io 2",categories:["multiplayer"],url:"https://ubg100.github.io/games/paperio2/"},
{title:"🍕 Stickman Hook",categories:["arcade"],url:"https://ubg100.github.io/games/stickman-hook/"},
{title:"🍕 Geometry Dash",categories:["arcade"],url:"https://ubg100.github.io/games/geometry-dash/"},
{title:"🍕 Happy Wheels",categories:["action"],url:"https://ubg100.github.io/games/happy-wheels/"},
{title:"🍕 Snow Rider 3D",categories:["racing"],url:"https://ubg100.github.io/games/snow-rider-3d/"},
{title:"🍕 Temple Run 2",categories:["arcade"],url:"https://ubg100.github.io/games/temple-run-2/"},
{title:"🍕 Crossy Road",categories:["arcade"],url:"https://ubg100.github.io/games/crossy-road/"},
{title:"🍕 Rooftop Snipers",categories:["action","multiplayer"],url:"https://ubg100.github.io/games/rooftop-snipers/"},
{title:"🍕 Drive Mad",categories:["racing"],url:"https://ubg100.github.io/games/drive-mad/"},
{title:"🍕 Subway Surfers",categories:["popular","arcade"],url:"https://ubg100.github.io/games/subway-surfers/"},
{title:"🍕 Minecraft Classic",categories:["builtin","multiplayer"],url:"https://classic.minecraft.net/"},

{title:"🍕 Agar.io",categories:["multiplayer"],url:"https://agar.io/"},
{title:"🍕 Slither.io",categories:["multiplayer"],url:"https://slither.io/"},
{title:"🍕 Diep.io",categories:["shooter"],url:"https://diep.io/"},
{title:"🍕 Zombs Royale",categories:["shooter","multiplayer"],url:"https://zombsroyale.io/"},
{title:"🍕 Surviv.io",categories:["shooter","multiplayer"],url:"https://surviv.io/"},

{title:"🍕 Duck Life",categories:["retro"],url:"https://ubg100.github.io/games/duck-life/"},
{title:"🍕 Duck Life 2",categories:["retro"],url:"https://ubg100.github.io/games/duck-life-2/"},
{title:"🍕 Duck Life 3",categories:["retro"],url:"https://ubg100.github.io/games/duck-life-3/"},
{title:"🍕 Duck Life 4",categories:["retro"],url:"https://ubg100.github.io/games/duck-life-4/"},

{title:"🍕 Vex 3",categories:["action"],url:"https://ubg100.github.io/games/vex-3/"},
{title:"🍕 Vex 4",categories:["action"],url:"https://ubg100.github.io/games/vex-4/"},
{title:"🍕 Vex 5",categories:["action"],url:"https://ubg100.github.io/games/vex-5/"},
{title:"🍕 Vex 6",categories:["action"],url:"https://ubg100.github.io/games/vex-6/"},
{title:"🍕 Vex 7",categories:["action"],url:"https://ubg100.github.io/games/vex-7/"},

{title:"🍕 Friday Night Funkin",categories:["popular"],url:"https://ubg100.github.io/games/fnf/"},
{title:"🍕 Baldi Basics",categories:["horror"],url:"https://ubg100.github.io/games/baldi/"},
{title:"🍕 Getaway Shootout",categories:["action","multiplayer"],url:"https://ubg100.github.io/games/getaway-shootout/"},
{title:"🍕 Soccer Random",categories:["multiplayer"],url:"https://ubg100.github.io/games/soccer-random/"},
{title:"🍕 Volley Random",categories:["multiplayer"],url:"https://ubg100.github.io/games/volley-random/"},
{title:"🍕 Boxing Random",categories:["multiplayer"],url:"https://ubg100.github.io/games/boxing-random/"},
{title:"🍕 Bad Ice Cream",categories:["puzzle"],url:"https://ubg100.github.io/games/bad-ice-cream/"}
];

/* IMAGES */
let id=0;
gameList.forEach(g=>g.img="https://picsum.photos/400/250?random="+(id++));

/* LOAD */
function loadGames(list){
const grid=document.getElementById("games");
grid.innerHTML="";
list.forEach((g,i)=>{
grid.innerHTML+=`
<div class="card" onclick="playGame('${g.url}')">
<div class="tag">${g.categories[0]}</div>
<img src="${g.img}" onerror="this.src='${fallback}'+${i}">
<h3>${g.title}</h3>
</div>`;
});
}

/* FILTER */
function filterGames(cat){
if(cat==="all"){loadGames(gameList);return;}
loadGames(gameList.filter(g=>g.categories.includes(cat)));
}

/* SEARCH */
function searchGames(q){
q=q.toLowerCase();
loadGames(gameList.filter(g=>g.title.toLowerCase().includes(q)));
}

/* PLAYER */
function playGame(url){
document.getElementById("frame").src=url;
document.getElementById("player").style.display="block";
}
function closeGame(){
document.getElementById("player").style.display="none";
document.getElementById("frame").src="";
}

window.onload=()=>loadGames(gameList);
</script>

</body>
</html>
