<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DarkGames ULTRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:black;color:white;}
#sidebar{width:180px;position:fixed;height:100%;background:#000;padding:10px;overflow:auto;}
.sidebar-item{margin:8px 0;cursor:pointer;color:#0ff;font-size:13px;}
.sidebar-item.active{color:#fff;}
#main{margin-left:190px;padding:10px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.game{background:#111;border-radius:8px;cursor:pointer;padding:10px;text-align:center;}
.game:hover{background:#222;}
#player{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:black;}
#player iframe{width:100%;height:100%;border:none;}
</style>
</head>

<body>

<div id="sidebar">
<div class="sidebar-item active" onclick="tab('home',this)">Home</div>
<div class="sidebar-item" onclick="tab('action',this)">Action</div>
<div class="sidebar-item" onclick="tab('racing',this)">Racing</div>
<div class="sidebar-item" onclick="tab('shooter',this)">Shooter</div>
<div class="sidebar-item" onclick="tab('arcade',this)">Arcade</div>
<div class="sidebar-item" onclick="tab('puzzle',this)">Puzzle</div>
<div class="sidebar-item" onclick="tab('sports',this)">Sports</div>
<div class="sidebar-item" onclick="tab('idle',this)">Idle</div>
<div class="sidebar-item" onclick="tab('funny',this)">Funny</div>
<div class="sidebar-item" onclick="tab('retro',this)">Retro</div>
<div class="sidebar-item" onclick="tab('built',this)">Built-in</div>
<div class="sidebar-item" onclick="tab('sites',this)">Sites</div>
<div class="sidebar-item" onclick="tab('favorites',this)">Favorites</div>
</div>

<div id="main">
<input placeholder="Search..." oninput="searchGames(this.value)">
<div id="home" class="grid"></div>
<div id="action" class="grid" style="display:none"></div>
<div id="racing" class="grid" style="display:none"></div>
<div id="shooter" class="grid" style="display:none"></div>
<div id="arcade" class="grid" style="display:none"></div>
<div id="puzzle" class="grid" style="display:none"></div>
<div id="sports" class="grid" style="display:none"></div>
<div id="idle" class="grid" style="display:none"></div>
<div id="funny" class="grid" style="display:none"></div>
<div id="retro" class="grid" style="display:none"></div>
<div id="favorites" class="grid" style="display:none"></div>
</div>

<div id="player">
<iframe id="frame"></iframe>
</div>

<script>

/* TAB */
function tab(id,el){
document.querySelectorAll("#main > div").forEach(d=>d.style.display="none");
document.getElementById(id).style.display="grid";
document.querySelectorAll(".sidebar-item").forEach(i=>i.classList.remove("active"));
el.classList.add("active");
}

/* GAME DATA (30 PER CATEGORY) */
const categories=["action","racing","shooter","arcade","puzzle","sports","idle","funny","retro"];

/* BASE GAME LIST (REAL WORKING PATHS) */
const baseGames=[
"slope","run-3","drift-hunters","moto-x3m","tunnel-rush","vex-6","vex-7",
"ovo","stickman-hook","temple-run-2","subway-surfers","geometry-dash",
"zombotron","rooftop-snipers","getaway-shootout","basketball-stars",
"tiny-fishing","idle-breakout","worlds-hardest-game","crossy-road",
"flappy-bird","jetpack-joyride","fruit-ninja","angry-birds","doodle-jump",
"paper-io","sand-game","stack-ball","helix-jump","bottle-flip"
];

/* LOAD GAMES */
categories.forEach(cat=>{
baseGames.forEach(name=>{
let url="https://ubg365.github.io/"+name+"/";
addGame("home",name,url);
addGame(cat,name,url);
});
});

/* ADD GAME */
function addGame(section,name,url){
let d=document.createElement("div");
d.className="game";
d.innerText=name;
d.onclick=()=>play(url);

/* DOUBLE CLICK FAVORITE */
d.ondblclick=(e)=>{
e.stopPropagation();
let favs=JSON.parse(localStorage.getItem("favs")||"[]");
if(!favs.includes(name)) favs.push(name);
localStorage.setItem("favs",JSON.stringify(favs));
};

document.getElementById(section).appendChild(d);
}

/* PLAYER */
function play(url){
document.getElementById("player").style.display="block";
frame.src=url;
}

/* SEARCH */
function searchGames(val){
val=val.toLowerCase();
document.querySelectorAll(".game").forEach(g=>{
g.style.display=g.innerText.toLowerCase().includes(val)?"block":"none";
});
}

</script>

</body>
</html>
